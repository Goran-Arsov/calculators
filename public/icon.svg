<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Calculator body -->
  <rect x="144" y="96" width="224" height="320" rx="32" ry="32" fill="rgba(255,255,255,0.15)"/>
  <!-- Screen -->
  <rect x="176" y="128" width="160" height="64" rx="12" ry="12" fill="rgba(255,255,255,0.95)"/>
  <!-- Button row 1 -->
  <rect x="176" y="224" width="40" height="40" rx="8" ry="8" fill="rgba(255,255,255,0.5)"/>
  <rect x="236" y="224" width="40" height="40" rx="8" ry="8" fill="rgba(255,255,255,0.5)"/>
  <rect x="296" y="224" width="40" height="40" rx="8" ry="8" fill="rgba(255,255,255,0.5)"/>
  <!-- Button row 2 -->
  <rect x="176" y="280" width="40" height="40" rx="8" ry="8" fill="rgba(255,255,255,0.5)"/>
  <rect x="236" y="280" width="40" height="40" rx="8" ry="8" fill="rgba(255,255,255,0.5)"/>
  <rect x="296" y="280" width="40" height="40" rx="8" ry="8" fill="rgba(255,255,255,0.5)"/>
  <!-- Equals button -->
  <rect x="176" y="340" width="160" height="44" rx="10" ry="10" fill="rgba(255,255,255,0.85)"/>
  <!-- Equals sign lines -->
  <rect x="236" y="352" width="40" height="4" rx="2" ry="2" fill="#7c3aed"/>
  <rect x="236" y="364" width="40" height="4" rx="2" ry="2" fill="#7c3aed"/>
</svg>
