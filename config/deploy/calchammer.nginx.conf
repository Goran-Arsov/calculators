upstream calchammer {
  server 127.0.0.1:3000;
}

# Redirect HTTP to HTTPS
server {
  listen 80;
  listen [::]:80;
  server_name calchammer.com www.calchammer.com;
  return 301 https://calchammer.com$request_uri;
}

# Redirect www to non-www (HTTPS)
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  server_name www.calchammer.com;

  ssl_certificate /etc/letsencrypt/live/calchammer.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/calchammer.com/privkey.pem;

  return 301 https://calchammer.com$request_uri;
}

# Main server block
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name calchammer.com;

  root /home/deploy/calchammer/public;

  # SSL certificates (managed by Certbot)
  ssl_certificate /etc/letsencrypt/live/calchammer.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/calchammer.com/privkey.pem;
  ssl_trusted_certificate /etc/letsencrypt/live/calchammer.com/chain.pem;

  # SSL settings
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;
  ssl_stapling on;
  ssl_stapling_verify on;
  resolver 8.8.8.8 8.8.4.4 valid=300s;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    application/javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    font/opentype
    image/svg+xml
    text/css
    text/html
    text/javascript
    text/plain
    text/xml;

  # Precompiled assets — long cache, immutable
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    gzip_static on;
    brotli_static on;
    access_log off;
  }

  # Favicon, robots, sitemap, ads.txt — medium cache
  location = /favicon.ico {
    expires 7d;
    access_log off;
  }

  location = /robots.txt {
    expires 1d;
    access_log off;
  }

  location = /sitemap.xml {
    proxy_pass http://calchammer;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 6h;
  }

  location = /ads.txt {
    expires 1d;
    access_log off;
  }

  # Health check — no logging
  location = /up {
    proxy_pass http://calchammer;
    proxy_set_header Host $host;
    access_log off;
  }

  # Block common exploit paths
  location ~ /\. {
    deny all;
    access_log off;
  }

  location ~* \.(php|asp|aspx|jsp|cgi)$ {
    deny all;
    access_log off;
  }

  # Try static files first, then proxy to Rails
  location / {
    try_files $uri @rails;
  }

  location @rails {
    proxy_pass http://calchammer;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    proxy_redirect off;
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 32 16k;

    proxy_connect_timeout 30;
    proxy_send_timeout 30;
    proxy_read_timeout 60;

    client_max_body_size 10M;
  }

  # Error pages
  error_page 500 502 503 504 /500.html;
  location = /500.html {
    root /home/deploy/calchammer/public;
    internal;
  }
}
