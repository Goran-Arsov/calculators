fr:
  health:
    category_name: "Sante"
    calculators:
      bmi:
        title: "Calculateur d'IMC - Outil Gratuit d'Indice de Masse Corporelle"
        description: "Calculez votre Indice de Masse Corporelle (IMC) instantanement avec notre calculateur gratuit. Supporte les unites metriques et imperiales. Trouvez votre categorie de poids et votre fourchette de poids sain."
        h1: "Calculateur d'IMC"
        intro: "Calculez votre Indice de Masse Corporelle et decouvrez si votre poids se situe dans une fourchette saine."
        breadcrumb: "Calculateur d'IMC"
        labels:
          unit_system: "Systeme d'unites"
          metric: "Metrique (kg, cm)"
          imperial: "Imperial (lbs, in)"
          weight: "Poids (kg)"
          height: "Taille (cm)"
          results: "Resultats"
          your_bmi: "Votre IMC"
          category: "Categorie"
          healthy_weight_min: "Poids sain Min"
          healthy_weight_max: "Poids sain Max"
          copy_results: "Copier les resultats"
        faq:
          q1: "Qu'est-ce que l'IMC et comment est-il calcule?"
          a1: "L'IMC (Indice de Masse Corporelle) est une mesure simple de la graisse corporelle basee sur le poids et la taille. Il est calcule en divisant le poids en kilogrammes par le carre de la taille en metres (kg/m2)."
          q2: "Quelle est la fourchette d'IMC saine?"
          a2: "Un IMC sain pour la plupart des adultes se situe entre 18,5 et 24,9. Un IMC inferieur a 18,5 est considere comme insuffisant, 25 a 29,9 comme surpoids et 30 ou plus comme obese."
          q3: "L'IMC est-il precis pour les athletes et les personnes musclees?"
          a3: "L'IMC peut surestimer la graisse corporelle chez les athletes car il ne distingue pas entre muscle et graisse. Le pourcentage de graisse corporelle peut etre une mesure plus utile pour ces personnes."
          q4: "L'IMC differe-t-il selon l'age et le sexe?"
          a4: "La formule standard de l'IMC est la meme pour tous les adultes. Cependant, l'interpretation peut varier. Pour les enfants et adolescents, l'IMC est interprete selon des percentiles specifiques a l'age et au sexe."
          q5: "Que dois-je faire si mon IMC est en dehors de la fourchette saine?"
          a5: "Si votre IMC est en dehors de la fourchette saine, consultez un professionnel de sante avant d'apporter des changements. Il pourra evaluer votre sante globale et recommander un plan personnalise."
      calorie:
        title: "Calculateur de Calories - Outil Gratuit de Besoins Caloriques"
        description: "Calculez vos besoins caloriques quotidiens avec notre calculateur gratuit. Estime le BMR et le TDEE selon l'age, le sexe, le poids, la taille et le niveau d'activite."
        h1: "Calculateur de Calories"
        intro: "Estimez vos besoins caloriques quotidiens pour le maintien, la perte ou la prise de poids selon vos donnees personnelles et votre niveau d'activite."
        breadcrumb: "Calculateur de Calories"
        labels:
          unit_system: "Systeme d'unites"
          metric: "Metrique (kg, cm)"
          imperial: "Imperial (lbs, in)"
          age: "Age (annees)"
          sex: "Sexe"
          male: "Homme"
          female: "Femme"
          weight: "Poids (kg)"
          height: "Taille (cm)"
          activity_level: "Niveau d'activite"
          sedentary: "Sedentaire (peu ou pas d'exercice)"
          light: "Leger (1-3 jours/semaine)"
          moderate: "Modere (3-5 jours/semaine)"
          active: "Actif (6-7 jours/semaine)"
          very_active: "Tres actif (exercice intense quotidien)"
          results: "Resultats"
          bmr: "Metabolisme de base (BMR)"
          maintenance: "Maintien (TDEE)"
          mild_loss: "Perte legere (-0,25 kg/sem)"
          weight_loss: "Perte de poids (-0,5 kg/sem)"
          mild_gain: "Prise legere (+0,25 kg/sem)"
          weight_gain: "Prise de poids (+0,5 kg/sem)"
          copy_results: "Copier les resultats"
        faq:
          q1: "Combien de calories ai-je besoin par jour?"
          a1: "Les besoins caloriques quotidiens varient selon l'age, le sexe, le poids, la taille et le niveau d'activite. La femme adulte moyenne a besoin d'environ 1 600 a 2 400 calories par jour, l'homme adulte moyen d'environ 2 000 a 3 000."
          q2: "Quelle est la difference entre BMR et TDEE?"
          a2: "Le BMR (metabolisme de base) est le nombre de calories que votre corps brule au repos complet. Le TDEE est votre BMR multiplie par un facteur d'activite."
          q3: "Combien de calories dois-je manger pour perdre du poids?"
          a3: "Un taux de perte de poids sur est de 0,5 a 1 kg par semaine, ce qui necessite un deficit quotidien d'environ 500 a 1 000 calories en dessous de votre TDEE."
          q4: "Qu'est-ce que l'equation de Mifflin-St Jeor?"
          a4: "L'equation de Mifflin-St Jeor est consideree comme la formule la plus precise pour estimer le BMR. Pour les hommes: BMR = (10 x poids en kg) + (6,25 x taille en cm) - (5 x age) + 5."
          q5: "L'exercice augmente-t-il le nombre de calories dont j'ai besoin?"
          a5: "Oui, l'activite physique augmente votre depense energetique totale quotidienne. Plus l'exercice est intense et frequent, plus vous brulez de calories."
      body_fat:
        title: "Calculateur de Graisse Corporelle - Outil Gratuit"
        description: "Estimez votre pourcentage de graisse corporelle avec notre calculateur gratuit utilisant la methode de la Marine americaine. Entrez vos mesures en unites metriques ou imperiales."
        h1: "Calculateur de Graisse Corporelle"
        intro: "Estimez votre pourcentage de graisse corporelle avec la methode de la Marine americaine a partir de simples mesures corporelles."
        breadcrumb: "Calculateur de Graisse Corporelle"
        labels:
          sex: "Sexe"
          male: "Homme"
          female: "Femme"
          unit_system: "Systeme d'unites"
          metric: "Metrique (cm)"
          imperial: "Imperial (in)"
          waist: "Tour de taille (cm)"
          neck: "Cou (cm)"
          height: "Taille (cm)"
          hip: "Hanches (cm)"
          results: "Resultats"
          body_fat_percentage: "Pourcentage de graisse corporelle"
          category: "Categorie"
          copy_results: "Copier les resultats"
        faq:
          q1: "Comment fonctionne la formule de graisse corporelle de la Marine americaine?"
          a1: "La methode de la Marine americaine estime le pourcentage de graisse corporelle a partir de mesures de circonference. Pour les hommes, la formule utilise les mesures de taille, cou et hauteur. Pour les femmes, une mesure de hanches est ajoutee."
          q2: "Quel est un pourcentage de graisse corporelle sain?"
          a2: "Les fourchettes saines different selon le sexe. Pour les hommes: 6-13% athletique, 14-17% en forme, 18-24% acceptable, plus de 25% obese. Pour les femmes: 14-20% athletique, 21-24% en forme, 25-31% acceptable, plus de 32% obese."
          q3: "Le pourcentage de graisse corporelle est-il plus utile que l'IMC?"
          a3: "Le pourcentage de graisse corporelle fournit une image plus precise de la composition corporelle que l'IMC car il estime directement la masse grasse plutot que de simplement relier le poids a la taille."
          q4: "Quelle est la precision de la methode de la Marine americaine?"
          a4: "La methode de la Marine americaine est precise a environ 3-4% de graisse corporelle pour la plupart des personnes lorsque les mesures sont prises correctement."
          q5: "Comment prendre les mesures corporelles pour ce calculateur?"
          a5: "Mesurez votre taille au point le plus etroit (au nombril pour les hommes). Mesurez votre cou juste en dessous du larynx. Mesurez les hanches (femmes uniquement) au point le plus large des fesses."
      tdee:
        title: "Calculateur TDEE - Outil Gratuit de Depense Energetique Totale"
        description: "Calculez votre depense energetique totale quotidienne (TDEE) et votre metabolisme de base (BMR) avec notre calculateur gratuit."
        h1: "Calculateur TDEE"
        intro: "Calculez votre depense energetique totale quotidienne et votre metabolisme de base pour comprendre combien de calories vous brulez chaque jour."
        breadcrumb: "Calculateur TDEE"
        labels:
          weight: "Poids (kg)"
          height: "Taille (cm)"
          age: "Age (annees)"
          gender: "Sexe"
          male: "Homme"
          female: "Femme"
          activity_level: "Niveau d'activite"
          sedentary: "Sedentaire (peu ou pas d'exercice)"
          light: "Legerement actif (1-3 jours/semaine)"
          moderate: "Moderement actif (3-5 jours/semaine)"
          active: "Tres actif (6-7 jours/semaine)"
          extra: "Extremement actif (intense quotidien + travail physique)"
          results: "Resultats"
          bmr: "Metabolisme de base (BMR)"
          tdee: "TDEE"
          copy_results: "Copier les resultats"
        faq:
          q1: "Qu'est-ce que le TDEE et pourquoi est-ce important?"
          a1: "TDEE signifie Total Daily Energy Expenditure - le nombre total de calories que votre corps brule en une journee. Connaitre votre TDEE est essentiel pour gerer votre poids."
          q2: "Quelle est la difference entre BMR et TDEE?"
          a2: "Le BMR est le nombre de calories dont votre corps a besoin au repos complet. Le TDEE prend votre BMR et le multiplie par un facteur d'activite."
          q3: "Quelle formule est utilisee pour calculer le BMR?"
          a3: "Ce calculateur utilise l'equation de Mifflin-St Jeor. Pour les hommes: BMR = (10 x poids en kg) + (6,25 x taille en cm) - (5 x age) + 5."
          q4: "Comment choisir le bon niveau d'activite?"
          a4: "Sedentaire signifie peu ou pas d'exercice. Legerement actif signifie exercice leger 1-3 jours par semaine. Moderement actif signifie exercice modere 3-5 jours par semaine. En cas de doute, choisissez un niveau inferieur."
          q5: "Comment utiliser le TDEE pour la perte de poids ou la prise de muscle?"
          a5: "Pour la perte de poids, mangez 300-500 calories en dessous de votre TDEE. Pour la prise de muscle, mangez 200-400 calories au-dessus de votre TDEE combine avec de l'entrainement en resistance."
      macro:
        title: "Calculateur de Macros - Outil Gratuit de Macronutriments"
        description: "Calculez votre repartition ideale de macronutriments avec notre calculateur gratuit. Objectifs personnalises en proteines, glucides et lipides."
        h1: "Calculateur de Macros"
        intro: "Calculez vos objectifs quotidiens ideaux en proteines, glucides et lipides selon votre apport calorique et votre objectif fitness."
        breadcrumb: "Calculateur de Macros"
        labels:
          daily_calories: "Calories quotidiennes"
          goal: "Objectif"
          maintain: "Maintien du poids"
          cut: "Seche (perte de graisse)"
          bulk: "Prise de masse (gain musculaire)"
          results: "Resultats"
          protein: "Proteines"
          carbs: "Glucides"
          fat: "Lipides"
          copy_results: "Copier les resultats"
        faq:
          q1: "Que sont les macronutriments et pourquoi sont-ils importants?"
          a1: "Les macronutriments - proteines, glucides et lipides - sont les trois principaux nutriments dont votre corps a besoin en grandes quantites. Chacun joue un role unique dans la composition corporelle, les niveaux d'energie et la performance."
          q2: "Combien de grammes de proteines ai-je besoin par jour?"
          a2: "Les besoins en proteines dependent de vos objectifs et de votre niveau d'activite. Pour la sante generale, 0,8 g par kg de poids corporel suffit. Pour la musculation, 1,6 a 2,2 g par kg sont recommandes."
          q3: "Quel est le meilleur ratio de macros pour perdre du poids?"
          a3: "Une repartition courante pour la perte de poids est 40% proteines, 35% glucides et 25% lipides. L'apport proteique plus eleve aide a preserver la masse musculaire pendant un deficit calorique."
          q4: "Quel est le meilleur ratio de macros pour prendre du muscle?"
          a4: "Pour la prise de muscle, une repartition typique est 30% proteines, 45% glucides et 25% lipides. Les glucides plus eleves alimentent les entrainements intenses et soutiennent la recuperation."
          q5: "Dois-je suivre mes macros exactement chaque jour?"
          a5: "Le suivi quotidien exact n'est pas necessaire pour la plupart des gens. Atteindre vos objectifs de macros a plus ou moins 10% est generalement suffisant pour voir des resultats."
