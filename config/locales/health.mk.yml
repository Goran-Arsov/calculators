          waist_imperial: "Обем на струк (инчи)"
          neck: "Врат (см)"
          neck_imperial: "Врат (инчи)"
          height: "Висина (см)"
          height_imperial: "Висина (инчи)"
          hip: "Колкови (см)"
          hip_imperial: "Колкови (инчи)"
          results: "Резултати"
          body_fat_percentage: "Процент на телесна маснотија"
          category: "Категорија"
          category_essential: "Есенцијална маснотија"
          category_athletes: "Спортисти"
          category_fitness: "Фитнес"
          category_average: "Просечно"
          category_obese: "Дебелина"
          copy_results: "Копирај резултати"
        faq:
          q1: "Како функционира формулата за телесна маснотија на Американската морнарица?"
          a1: "Методот на Американската морнарица го проценува процентот на телесна маснотија од мерки на обем. За мажи, формулата користи мерки на струк, врат и висина. За жени, се додава и мерка на колкови."
          q2: "Кој е здравиот процент на телесна маснотија?"
          a2: "Здравите опсези се разликуваат според полот. За мажи: 6-13% атлетски, 14-17% во форма, 18-24% прифатливо, над 25% дебелина. За жени: 14-20% атлетски, 21-24% во форма, 25-31% прифатливо, над 32% дебелина."
          q3: "Дали процентот на телесна маснотија е покорисен од ИТМ?"
          a3: "Процентот на телесна маснотија дава поточна слика за составот на телото од ИТМ бидејќи директно ја проценува масната маса наместо едноставно да ги поврзува тежината и висината."
          q4: "Колку е точен методот на Американската морнарица?"
          a4: "Методот на Американската морнарица е точен до околу 3-4% телесна маснотија за повеќето лица кога мерките се правилно земени."
          q5: "Како да ги земам телесните мерки за овој калкулатор?"
          a5: "Измерете го струкот на најтесната точка (на папокот за мажи). Измерете го вратот веднаш под гркланот. Измерете ги колковите (само за жени) на најширокиот дел на задникот."
      tdee:
        title: "Калкулатор за TDEE - Бесплатна алатка за вкупна дневна потрошувачка на енергија"
        description: "Пресметајте ја вашата вкупна дневна потрошувачка на енергија (TDEE) и базалниот метаболизам (BMR) со нашиот бесплатен калкулатор."
        h1: "Калкулатор за TDEE"
        intro: "Пресметајте ја вашата вкупна дневна потрошувачка на енергија и базалниот метаболизам за да разберете колку калории согорувате секој ден."
        breadcrumb: "Калкулатор за TDEE"
        labels:
          weight: "Тежина (кг)"
          height: "Висина (см)"
          age: "Возраст (години)"
          gender: "Пол"
          male: "Машки"
          female: "Женски"
          activity_level: "Ниво на активност"
          sedentary: "Седентарно (малку или без вежбање)"
          light: "Лесно активно (1-3 дена/неделно)"
          moderate: "Умерено активно (3-5 дена/неделно)"
          active: "Многу активно (6-7 дена/неделно)"
          extra: "Екстремно активно (интензивно секојдневно + физичка работа)"
          results: "Резултати"
          bmr: "Базален метаболизам (BMR)"
          tdee: "TDEE"
          copy_results: "Копирај резултати"
        faq:
          q1: "Што е TDEE и зошто е важно?"
          a1: "TDEE значи Total Daily Energy Expenditure - вкупниот број на калории што вашето тело ги согорува за еден ден. Познавањето на вашиот TDEE е суштинско за управување со тежината."
          q2: "Која е разликата помеѓу BMR и TDEE?"
          a2: "BMR е бројот на калории што му се потребни на вашето тело во целосен мир. TDEE го зема вашиот BMR и го множи со фактор на активност."
          q3: "Која формула се користи за пресметка на BMR?"
          a3: "Овој калкулатор ја користи равенката на Мифлин-Сент Жеор. За мажи: BMR = (10 x тежина во кг) + (6,25 x висина во см) - (5 x возраст) + 5."
          q4: "Како да го изберам правилното ниво на активност?"
          a4: "Седентарно значи малку или без вежбање. Лесно активно значи лесно вежбање 1-3 дена неделно. Умерено активно значи умерено вежбање 3-5 дена неделно. Ако се двоумите, изберете пониско ниво."
          q5: "Како да го користам TDEE за губење тежина или зголемување на мускули?"
          a5: "За губење тежина, јадете 300-500 калории под вашиот TDEE. За зголемување на мускули, јадете 200-400 калории над вашиот TDEE комбинирано со тренинг со отпор."
      macro:
        title: "Калкулатор за макронутриенти - Бесплатна алатка"
        description: "Пресметајте ја вашата идеална распределба на макронутриенти со нашиот бесплатен калкулатор. Персонализирани цели за протеини, јаглехидрати и масти."
        h1: "Калкулатор за макронутриенти"
        intro: "Пресметајте ги вашите идеални дневни цели за протеини, јаглехидрати и масти според вашиот калориски внес и фитнес цел."
        breadcrumb: "Калкулатор за макронутриенти"
        labels:
          daily_calories: "Дневни калории"
          goal: "Цел"
          maintain: "Одржување на тежина"
          cut: "Сечење (губење маснотија)"
          bulk: "Зголемување (добивање мускули)"
          results: "Резултати"
          protein: "Протеини"
          carbs: "Јаглехидрати"
          fat: "Масти"
          copy_results: "Копирај резултати"
        faq:
          q1: "Што се макронутриенти и зошто се важни?"
          a1: "Макронутриентите - протеини, јаглехидрати и масти - се трите главни хранливи материи кои му се потребни на вашето тело во големи количини. Секој игра уникатна улога во составот на телото, нивоата на енергија и перформансите."
          q2: "Колку грами протеини ми се потребни дневно?"
          a2: "Потребите за протеини зависат од вашите цели и ниво на активност. За општо здравје, 0,8 г по кг телесна тежина е доволно. За зголемување на мускулна маса, се препорачуваат 1,6 до 2,2 г по кг."
          q3: "Кој е најдобриот однос на макронутриенти за губење тежина?"
          a3: "Вообичаена распределба за губење тежина е 40% протеини, 35% јаглехидрати и 25% масти. Повисокиот внес на протеини помага да се зачува мускулната маса за време на калориски дефицит."
          q4: "Кој е најдобриот однос на макронутриенти за зголемување на мускули?"
          a4: "За зголемување на мускули, типична распределба е 30% протеини, 45% јаглехидрати и 25% масти. Повисоките јаглехидрати ги напојуваат интензивните тренинзи и ја поддржуваат обновата."
          q5: "Дали треба точно да ги следам макронутриентите секој ден?"
          a5: "Точното дневно следење не е неопходно за повеќето луѓе. Достигнувањето на вашите цели за макронутриенти со отстапување од плус-минус 10% е генерално доволно за да видите резултати."
