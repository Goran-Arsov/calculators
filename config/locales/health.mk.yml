mk:
  health:
    category_name: "Здравје"
    calculators:
      bmi:
        title: "Калкулатор за ИТМ - Бесплатна алатка за индекс на телесна маса"
        description: "Пресметајте го вашиот индекс на телесна маса (ИТМ) моментално со нашиот бесплатен калкулатор. Поддржува метрички и империјални единици. Дознајте ја вашата категорија на тежина и опсегот на здрава тежина."
        h1: "Калкулатор за ИТМ"
        intro: "Пресметајте го вашиот индекс на телесна маса и дознајте дали вашата тежина е во здрав опсег."
        breadcrumb: "Калкулатор за ИТМ"
        labels:
          unit_system: "Систем на единици"
          metric: "Метрички (кг, см)"
          imperial: "Империјални (lbs, in)"
          weight: "Тежина (кг)"
          weight_imperial: "Тежина (lbs)"
          height: "Висина (см)"
          height_imperial: "Висина (инчи)"
          results: "Резултати"
          your_bmi: "Вашиот ИТМ"
          category: "Категорија"
          category_underweight: "Потхранетост"
          category_normal: "Нормална тежина"
          category_overweight: "Прекумерна тежина"
          category_obese: "Дебелина"
          healthy_weight_min: "Здрава тежина мин."
          healthy_weight_max: "Здрава тежина макс."
          copy_results: "Копирај резултати"
        faq:
          q1: "Што е ИТМ и како се пресметува?"
          a1: "ИТМ (Индекс на телесна маса) е едноставна мерка за телесната маснотија базирана на тежината и висината. Се пресметува со делење на тежината во килограми со квадратот на висината во метри (кг/м2)."
          q2: "Кој е здравиот опсег на ИТМ?"
          a2: "Здравиот ИТМ за повеќето возрасни е помеѓу 18,5 и 24,9. ИТМ под 18,5 се смета за потхранетост, 25 до 29,9 за прекумерна тежина, а 30 или повеќе за дебелина."
          q3: "Дали ИТМ е точен за спортисти и мускулести лица?"
          a3: "ИТМ може да ја прецени телесната маснотија кај спортистите бидејќи не прави разлика помеѓу мускули и маснотија. Процентот на телесна маснотија може да биде покорисна мерка за овие лица."
          q4: "Дали ИТМ се разликува според возраст и пол?"
          a4: "Стандардната формула за ИТМ е иста за сите возрасни. Сепак, интерпретацијата може да варира. За деца и адолесценти, ИТМ се интерпретира според перцентили специфични за возраста и полот."
          q5: "Што треба да направам ако мојот ИТМ е надвор од здравиот опсег?"
          a5: "Ако вашиот ИТМ е надвор од здравиот опсег, консултирајте се со здравствен професионалец пред да правите промени. Тој може да го процени вашето целокупно здравје и да препорача персонализиран план."
      calorie:
        title: "Калкулатор за калории - Бесплатна алатка за потребни калории"
        description: "Пресметајте ги вашите дневни потреби за калории со нашиот бесплатен калкулатор. Проценка на BMR и TDEE според возраст, пол, тежина, висина и ниво на активност."
        h1: "Калкулатор за калории"
        intro: "Проценете ги вашите дневни потреби за калории за одржување, губење или зголемување на тежина според вашите лични податоци и ниво на активност."
        breadcrumb: "Калкулатор за калории"
        labels:
          unit_system: "Систем на единици"
          metric: "Метрички (кг, см)"
          imperial: "Империјални (lbs, in)"
          age: "Возраст (години)"
          sex: "Пол"
          male: "Машки"
          female: "Женски"
          weight: "Тежина (кг)"
          weight_imperial: "Тежина (lbs)"
          height: "Висина (см)"
          height_imperial: "Висина (инчи)"
          activity_level: "Ниво на активност"
          sedentary: "Седентарно (малку или без вежбање)"
          light: "Лесно (1-3 дена/неделно)"
          moderate: "Умерено (3-5 дена/неделно)"
          active: "Активно (6-7 дена/неделно)"
          very_active: "Многу активно (интензивно вежбање секојдневно)"
          results: "Резултати"
          bmr: "Базален метаболизам (BMR)"
          maintenance: "Одржување (TDEE)"
          mild_loss: "Лесно губење (-0,25 кг/нед)"
          weight_loss: "Губење на тежина (-0,5 кг/нед)"
          mild_gain: "Лесно зголемување (+0,25 кг/нед)"
          weight_gain: "Зголемување на тежина (+0,5 кг/нед)"
          copy_results: "Копирај резултати"
        faq:
          q1: "Колку калории ми се потребни дневно?"
          a1: "Дневните потреби за калории варираат според возраст, пол, тежина, висина и ниво на активност. Просечната возрасна жена има потреба од околу 1 600 до 2 400 калории дневно, а просечниот возрасен маж од околу 2 000 до 3 000."
          q2: "Која е разликата помеѓу BMR и TDEE?"
          a2: "BMR (базален метаболизам) е бројот на калории што вашето тело ги согорува во целосен мир. TDEE е вашиот BMR помножен со фактор на активност."
          q3: "Колку калории треба да јадам за да изгубам тежина?"
          a3: "Безбедна стапка на губење тежина е 0,5 до 1 кг неделно, што бара дневен дефицит од околу 500 до 1 000 калории под вашиот TDEE."
          q4: "Што е равенката на Мифлин-Сент Жеор?"
          a4: "Равенката на Мифлин-Сент Жеор се смета за најточната формула за проценка на BMR. За мажи: BMR = (10 x тежина во кг) + (6,25 x висина во см) - (5 x возраст) + 5."
          q5: "Дали вежбањето го зголемува бројот на калории што ми се потребни?"
          a5: "Да, физичката активност ја зголемува вашата вкупна дневна енергетска потрошувачка. Колку поинтензивно и почесто е вежбањето, толку повеќе калории согорувате."
      body_fat:
        title: "Калкулатор за телесна маснотија - Бесплатна алатка"
        description: "Проценете го вашиот процент на телесна маснотија со нашиот бесплатен калкулатор кој го користи методот на Американската морнарица. Внесете ги мерките во метрички или империјални единици."
        h1: "Калкулатор за телесна маснотија"
        intro: "Проценете го вашиот процент на телесна маснотија со методот на Американската морнарица користејќи едноставни телесни мерки."
        breadcrumb: "Калкулатор за телесна маснотија"
        labels:
          sex: "Пол"
          male: "Машки"
          female: "Женски"
          unit_system: "Систем на единици"
          metric: "Метрички (см)"
