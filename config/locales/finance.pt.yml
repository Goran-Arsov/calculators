        breadcrumb: "Calculadora de Investimento"
        labels:
          initial_investment: "Investimento inicial ($)"
          monthly_contribution: "Contribuicao mensal ($)"
          expected_annual_return: "Retorno anual esperado (%)"
          investment_period: "Periodo de investimento (Anos)"
          results: "Resultados"
          future_value: "Valor futuro"
          total_contributions: "Contribuicoes totais"
          investment_growth: "Crescimento do investimento"
          copy_results: "Copiar resultados"
        faq:
          q1: "Como funciona uma calculadora de investimento?"
          a1: "Uma calculadora de investimento projeta o valor futuro do seu dinheiro aplicando crescimento composto ao seu investimento inicial e contribuicoes mensais regulares."
          q2: "Qual e uma taxa de retorno anual realista para investimentos?"
          a2: "O retorno anual medio historico do S&P 500 e aproximadamente 10% antes da inflacao, ou cerca de 7% apos a inflacao. Um portfolio equilibrado pode esperar 6-8% ao ano a longo prazo."
          q3: "Quanto devo investir todo mes?"
          a3: "Uma orientacao comum e investir pelo menos 15-20% de sua renda bruta para a aposentadoria. Comece com o que puder e aumente as contribuicoes com o tempo."
          q4: "O que e Dollar-Cost Averaging?"
          a4: "Dollar-Cost Averaging e a estrategia de investir um valor fixo em intervalos regulares, independentemente das condicoes do mercado."
          q5: "Devo investir uma quantia unica ou distribuir ao longo do tempo?"
          a5: "Estudos mostram que o investimento de quantia unica supera o Dollar-Cost Averaging aproximadamente dois tercos do tempo, pois os mercados tendem a subir ao longo do tempo."
      retirement:
        title: "Calculadora de Aposentadoria - Ferramenta Gratuita Online"
        description: "Planeje sua aposentadoria com nossa calculadora gratuita. Estime economias projetadas, renda mensal de aposentadoria e anos ate a aposentadoria."
        h1: "Calculadora de Aposentadoria"
        intro: "Estime quanto tera economizado para a aposentadoria e qual renda mensal seu patrimonio podera fornecer."
        breadcrumb: "Calculadora de Aposentadoria"
        labels:
          current_age: "Idade atual"
          retirement_age: "Idade de aposentadoria"
          current_savings: "Economias atuais ($)"
          monthly_contribution: "Contribuicao mensal ($)"
          expected_annual_return: "Retorno anual esperado (%)"
          results: "Resultados"
          years_to_retire: "Anos para aposentar"
          projected_savings: "Economias projetadas"
          estimated_monthly_income: "Renda mensal estimada"
          copy_results: "Copiar resultados"
        faq:
          q1: "Quanto dinheiro preciso para me aposentar?"
          a1: "O valor depende do seu estilo de vida desejado, despesas esperadas e duracao da sua aposentadoria. Uma regra comum e economizar 25 vezes suas despesas anuais esperadas."
          q2: "O que e a regra dos 4% para aposentadoria?"
          a2: "A regra dos 4% sugere que aposentados podem retirar 4% de suas economias no primeiro ano e ajustar pela inflacao a cada ano seguinte sem esgotar seus fundos por pelo menos 30 anos."
          q3: "Quando devo comecar a economizar para a aposentadoria?"
          a3: "Quanto antes comecar, mais tempo seu dinheiro tem para crescer com os juros compostos. Comecar aos 20 anos significa que mesmo pequenas contribuicoes mensais podem crescer substancialmente."
          q4: "Como os juros compostos afetam minhas economias para aposentadoria?"
          a4: "Juros compostos significam que voce ganha rendimentos nao apenas sobre suas contribuicoes originais, mas tambem sobre os juros acumulados de anos anteriores."
          q5: "Devo contribuir mais para a aposentadoria a medida que envelheço?"
          a5: "Sim, aumentar suas contribuicoes a medida que sua renda cresce e uma estrategia inteligente. Muitos consultores financeiros recomendam economizar 10-15% de sua renda bruta para a aposentadoria."
