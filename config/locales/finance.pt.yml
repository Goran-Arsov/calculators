      mortgage:
        title: "Calculadora de Hipoteca - Ferramenta Gratuita Online"
        description: "Calcule seu pagamento mensal de hipoteca, juros totais e custo total do seu emprestimo imobiliario. Calculadora de hipoteca gratuita com resultados instantaneos."
        h1: "Calculadora de Hipoteca"
        intro: "Estime seu pagamento mensal de hipoteca, juros totais e custo total do seu emprestimo imobiliario."
        breadcrumb: "Calculadora de Hipoteca"
        labels:
          home_price: "Preco do imovel ($)"
          annual_interest_rate: "Taxa de juros anual (%)"
          loan_term: "Prazo do emprestimo (Anos)"
          results: "Resultados"
          monthly_payment: "Pagamento mensal"
          total_paid: "Total pago"
          total_interest: "Juros totais"
          number_of_payments: "Numero de pagamentos"
          copy_results: "Copiar resultados"
        faq:
          q1: "Como se calcula um pagamento mensal de hipoteca?"
          a1: "Um pagamento mensal de hipoteca e calculado com a formula M = P[r(1+r)^n] / [(1+r)^n - 1], onde P e o valor do emprestimo, r a taxa de juros mensal (taxa anual dividida por 12), e n o numero total de pagamentos mensais (anos vezes 12)."
          q2: "O que e uma boa taxa de juros hipotecaria?"
          a2: "Uma boa taxa hipotecaria depende das condicoes atuais do mercado, sua pontuacao de credito e tipo de emprestimo. Geralmente, taxas entre 3% e 7% sao comuns para hipotecas de taxa fixa."
          q3: "Quanto de casa posso pagar?"
          a3: "Uma orientacao comum e que seu pagamento mensal de hipoteca nao deve exceder 28% de sua renda mensal bruta."
          q4: "Qual e a diferenca entre uma hipoteca de 15 e 30 anos?"
          a4: "Uma hipoteca de 15 anos tem pagamentos mensais mais altos, mas juros totais significativamente menores. Uma hipoteca de 30 anos oferece pagamentos mensais mais baixos, mas custa mais em juros totais."
          q5: "Devo fazer pagamentos adicionais na minha hipoteca?"
          a5: "Pagamentos adicionais podem economizar milhares em juros e ajuda-lo a quitar sua hipoteca mais rapido. Verifique primeiro se seu credor nao cobra penalidades por pagamento antecipado."
      compound_interest:
        title: "Calculadora de Juros Compostos - Ferramenta Gratuita Online"
        description: "Calcule juros compostos sobre suas economias ou investimentos. Veja como seu dinheiro cresce com diferentes frequencias de capitalizacao."
        h1: "Calculadora de Juros Compostos"
        intro: "Veja como seu dinheiro cresce ao longo do tempo com o poder dos juros compostos."
        breadcrumb: "Calculadora de Juros Compostos"
        labels:
          initial_principal: "Capital inicial ($)"
          annual_interest_rate: "Taxa de juros anual (%)"
          time_period: "Periodo (Anos)"
          compounding_frequency: "Frequencia de capitalizacao"
          annually: "Anual (1x/ano)"
          semi_annually: "Semestral (2x/ano)"
          quarterly: "Trimestral (4x/ano)"
          monthly: "Mensal (12x/ano)"
          daily: "Diario (365x/ano)"
          results: "Resultados"
          future_value: "Valor futuro"
          total_interest_earned: "Juros totais ganhos"
          initial_principal_display: "Capital inicial"
          copy_results: "Copiar resultados"
        faq:
          q1: "O que sao juros compostos?"
          a1: "Juros compostos sao juros calculados sobre o capital inicial e sobre os juros acumulados de periodos anteriores. Diferente dos juros simples, os juros compostos permitem que seu dinheiro cresca exponencialmente."
          q2: "Com que frequencia os juros devem ser capitalizados?"
          a2: "Uma capitalizacao mais frequente produz maiores rendimentos. A capitalizacao diaria rende ligeiramente mais que a mensal, que rende mais que a trimestral ou anual."
          q3: "O que e a regra dos 72?"
          a3: "A regra dos 72 e uma forma rapida de estimar quanto tempo leva para um investimento dobrar. Divida 72 pela taxa de juros anual. A 6%, seu dinheiro dobra em aproximadamente 12 anos."
          q4: "Qual e a diferenca entre taxa nominal e taxa efetiva?"
          a4: "A taxa nominal e a taxa de juros anual sem considerar a capitalizacao. A taxa efetiva inclui o efeito da capitalizacao e reflete o rendimento real que voce ganha em um ano."
          q5: "Como os juros compostos diferem dos juros simples?"
          a5: "Juros simples sao calculados apenas sobre o capital inicial. Juros compostos sao calculados sobre o capital mais todos os juros ganhos anteriormente. A longo prazo, os juros compostos geram significativamente mais riqueza."
      loan:
        title: "Calculadora de Emprestimo - Ferramenta Gratuita Online"
        description: "Calcule pagamentos mensais, juros totais e custo total para qualquer tipo de emprestimo. Calculadora de emprestimo gratuita com resultados instantaneos."
        h1: "Calculadora de Emprestimo"
        intro: "Calcule pagamentos mensais, juros totais e custo total para qualquer tipo de emprestimo."
        breadcrumb: "Calculadora de Emprestimo"
        labels:
          loan_amount: "Valor do emprestimo ($)"
          annual_interest_rate: "Taxa de juros anual (%)"
          loan_term: "Prazo do emprestimo (Anos)"
          results: "Resultados"
          monthly_payment: "Pagamento mensal"
          total_paid: "Total pago"
          total_interest: "Juros totais"
          number_of_payments: "Numero de pagamentos"
          copy_results: "Copiar resultados"
        faq:
          q1: "Como se calculam os pagamentos mensais de um emprestimo?"
          a1: "Os pagamentos mensais sao calculados com a formula de amortizacao: M = P[r(1+r)^n] / [(1+r)^n - 1], onde P e o valor do emprestimo, r a taxa de juros mensal e n o numero total de pagamentos."
          q2: "Quais fatores afetam as taxas de juros dos emprestimos?"
          a2: "As taxas de juros sao influenciadas pela sua pontuacao de credito, renda, valor e prazo do emprestimo, garantias e as condicoes atuais do mercado."
          q3: "E melhor escolher um prazo de emprestimo mais curto ou mais longo?"
          a3: "Um prazo mais curto significa pagamentos mensais mais altos, mas menos juros totais pagos. Um prazo mais longo reduz o pagamento mensal, mas custa mais no total."
          q4: "Qual e a diferenca entre emprestimos com garantia e sem garantia?"
          a4: "Emprestimos com garantia sao respaldados por bens como carro ou casa. Emprestimos sem garantia nao tem respaldo e, portanto, possuem taxas de juros mais altas."
          q5: "Posso pagar um emprestimo antecipadamente para economizar em juros?"
          a5: "Sim, o pagamento antecipado pode economizar muito em juros. No entanto, alguns credores cobram penalidades por pagamento antecipado. Verifique seu contrato antes de fazer pagamentos adicionais."
