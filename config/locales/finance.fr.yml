fr:
  finance:
    category_name: "Finance"
    calculators:
      mortgage:
        title: "Calculateur Hypothecaire - Outil Gratuit en Ligne"
        description: "Calculez votre mensualite hypothecaire, les interets totaux et le cout total de votre pret immobilier. Calculateur hypothecaire gratuit avec resultats instantanes."
        h1: "Calculateur Hypothecaire"
        intro: "Estimez votre mensualite hypothecaire, les interets totaux et le cout global de votre pret immobilier."
        breadcrumb: "Calculateur Hypothecaire"
        labels:
          home_price: "Prix du bien ($)"
          annual_interest_rate: "Taux d'interet annuel (%)"
          loan_term: "Duree du pret (Annees)"
          results: "Resultats"
          monthly_payment: "Mensualite"
          total_paid: "Total paye"
          total_interest: "Interets totaux"
          number_of_payments: "Nombre de paiements"
          copy_results: "Copier les resultats"
        faq:
          q1: "Comment calcule-t-on une mensualite hypothecaire?"
          a1: "Une mensualite hypothecaire est calculee avec la formule M = P[r(1+r)^n] / [(1+r)^n - 1], ou P est le montant du pret, r le taux d'interet mensuel (taux annuel divise par 12), et n le nombre total de mensualites (annees fois 12)."
          q2: "Qu'est-ce qu'un bon taux hypothecaire?"
          a2: "Un bon taux hypothecaire depend des conditions actuelles du marche, de votre cote de credit et du type de pret. En general, les taux entre 3% et 7% sont courants pour les hypotheques a taux fixe."
          q3: "Combien de maison puis-je me permettre?"
          a3: "Une recommandation courante est que votre mensualite hypothecaire ne devrait pas depasser 28% de votre revenu mensuel brut."
          q4: "Quelle est la difference entre un pret hypothecaire de 15 ans et de 30 ans?"
          a4: "Un pret de 15 ans a des mensualites plus elevees mais des interets totaux nettement inferieurs. Un pret de 30 ans offre des mensualites plus basses mais coute plus en interets totaux."
          q5: "Devrais-je effectuer des paiements supplementaires sur mon hypotheque?"
          a5: "Les paiements supplementaires peuvent vous faire economiser des milliers en interets et vous aider a rembourser votre hypotheque plus rapidement. Verifiez d'abord que votre preteur n'applique pas de penalites de remboursement anticipe."
      compound_interest:
        title: "Calculateur d'Interets Composes - Outil Gratuit en Ligne"
        description: "Calculez les interets composes sur vos economies ou investissements. Voyez comment votre argent croit avec differentes frequences de capitalisation."
        h1: "Calculateur d'Interets Composes"
        intro: "Voyez comment votre argent croit au fil du temps grace a la puissance des interets composes."
        breadcrumb: "Calculateur d'Interets Composes"
        labels:
          initial_principal: "Capital initial ($)"
          annual_interest_rate: "Taux d'interet annuel (%)"
          time_period: "Periode (Annees)"
          compounding_frequency: "Frequence de capitalisation"
          annually: "Annuel (1x/an)"
          semi_annually: "Semestriel (2x/an)"
          quarterly: "Trimestriel (4x/an)"
          monthly: "Mensuel (12x/an)"
          daily: "Quotidien (365x/an)"
          results: "Resultats"
          future_value: "Valeur future"
          total_interest_earned: "Interets totaux gagnes"
          initial_principal_display: "Capital initial"
          copy_results: "Copier les resultats"
        faq:
          q1: "Que sont les interets composes?"
          a1: "Les interets composes sont des interets calcules sur le capital initial et sur les interets accumules des periodes precedentes. Contrairement aux interets simples, les interets composes permettent a votre argent de croitre exponentiellement."
          q2: "A quelle frequence les interets devraient-ils etre capitalises?"
          a2: "Une capitalisation plus frequente produit des rendements plus eleves. La capitalisation quotidienne rapporte legerement plus que mensuelle, qui rapporte plus que trimestrielle ou annuelle."
          q3: "Qu'est-ce que la regle de 72?"
          a3: "La regle de 72 est un moyen rapide d'estimer combien de temps il faut pour qu'un investissement double. Divisez 72 par le taux d'interet annuel. A 6%, votre argent double en environ 12 ans."
          q4: "Quelle est la difference entre TEG et TAE?"
          a4: "Le TEG est le taux d'interet annuel nominal sans tenir compte de la capitalisation. Le TAE inclut l'effet de la capitalisation et reflete le rendement reel que vous gagnez en un an."
          q5: "Comment les interets composes different-ils des interets simples?"
          a5: "Les interets simples sont calcules uniquement sur le capital initial. Les interets composes sont calcules sur le capital plus tous les interets precedemment gagnes. Sur de longues periodes, les interets composes generent nettement plus de richesse."
      loan:
        title: "Calculateur de Pret - Outil Gratuit en Ligne"
        description: "Calculez les mensualites, les interets totaux et le cout total pour tout type de pret. Calculateur de pret gratuit avec resultats instantanes."
        h1: "Calculateur de Pret"
        intro: "Calculez les mensualites, les interets totaux et le cout global pour tout type de pret."
        breadcrumb: "Calculateur de Pret"
        labels:
          loan_amount: "Montant du pret ($)"
          annual_interest_rate: "Taux d'interet annuel (%)"
          loan_term: "Duree du pret (Annees)"
          results: "Resultats"
          monthly_payment: "Mensualite"
          total_paid: "Total paye"
          total_interest: "Interets totaux"
          number_of_payments: "Nombre de paiements"
          copy_results: "Copier les resultats"
        faq:
          q1: "Comment calcule-t-on les mensualites d'un pret?"
          a1: "Les mensualites d'un pret sont calculees avec la formule d'amortissement: M = P[r(1+r)^n] / [(1+r)^n - 1], ou P est le montant du pret, r le taux d'interet mensuel et n le nombre total de paiements."
          q2: "Quels facteurs influencent les taux d'interet des prets?"
          a2: "Les taux d'interet sont influences par votre cote de credit, vos revenus, le montant et la duree du pret, les garanties et les conditions actuelles du marche."
          q3: "Vaut-il mieux choisir une duree de pret plus courte ou plus longue?"
          a3: "Une duree plus courte signifie des mensualites plus elevees mais moins d'interets totaux payes. Une duree plus longue reduit la mensualite mais coute plus au total."
          q4: "Quelle est la difference entre les prets garantis et non garantis?"
          a4: "Les prets garantis sont adosses a des biens comme une voiture ou une maison. Les prets non garantis n'ont pas de garantie et portent donc des taux d'interet plus eleves."
          q5: "Puis-je rembourser un pret par anticipation pour economiser sur les interets?"
          a5: "Oui, le remboursement anticipe peut vous faire economiser beaucoup sur les interets. Cependant, certains preteurs appliquent des penalites de remboursement anticipe. Verifiez votre contrat de pret avant d'effectuer des paiements supplementaires."
      investment:
        title: "Calculateur d'Investissement - Outil Gratuit en Ligne"
        description: "Projetez la valeur future de vos investissements avec des contributions mensuelles regulieres. Voyez comment votre portefeuille croit au fil du temps."
        h1: "Calculateur d'Investissement"
        intro: "Projetez comment vos investissements croissent au fil du temps avec un depot initial et des contributions mensuelles regulieres."
        breadcrumb: "Calculateur d'Investissement"
        labels:
          initial_investment: "Investissement initial ($)"
          monthly_contribution: "Contribution mensuelle ($)"
          expected_annual_return: "Rendement annuel attendu (%)"
          investment_period: "Periode d'investissement (Annees)"
          results: "Resultats"
          future_value: "Valeur future"
          total_contributions: "Contributions totales"
          investment_growth: "Croissance de l'investissement"
          copy_results: "Copier les resultats"
        faq:
          q1: "Comment fonctionne un calculateur d'investissement?"
          a1: "Un calculateur d'investissement projette la valeur future de votre argent en appliquant la croissance composee a votre investissement initial et a vos contributions mensuelles regulieres."
          q2: "Quel est un taux de rendement annuel realiste pour les investissements?"
          a2: "Le rendement annuel moyen historique du S&P 500 est d'environ 10% avant inflation, soit environ 7% apres inflation. Un portefeuille equilibre peut attendre 6-8% par an a long terme."
          q3: "Combien devrais-je investir chaque mois?"
          a3: "Une recommandation courante est d'investir au moins 15-20% de votre revenu brut pour la retraite. Commencez avec ce que vous pouvez vous permettre et augmentez les contributions au fil du temps."
          q4: "Qu'est-ce que l'investissement programme?"
          a4: "L'investissement programme consiste a investir un montant fixe a intervalles reguliers, quelles que soient les conditions du marche. Vous achetez plus de parts quand les prix sont bas et moins quand ils sont eleves."
          q5: "Devrais-je investir une somme forfaitaire ou la repartir dans le temps?"
          a5: "Les etudes montrent que l'investissement forfaitaire surpasse l'investissement programme environ deux tiers du temps, car les marches ont tendance a monter au fil du temps."
      retirement:
        title: "Calculateur de Retraite - Outil Gratuit en Ligne"
        description: "Planifiez votre retraite avec notre calculateur gratuit. Estimez l'epargne projetee, le revenu mensuel de retraite et les annees avant la retraite."
        h1: "Calculateur de Retraite"
        intro: "Estimez combien vous aurez epargne a la retraite et quel revenu mensuel votre patrimoine pourra fournir."
        breadcrumb: "Calculateur de Retraite"
        labels:
          current_age: "Age actuel"
          retirement_age: "Age de depart a la retraite"
          current_savings: "Epargne actuelle ($)"
          monthly_contribution: "Contribution mensuelle ($)"
          expected_annual_return: "Rendement annuel attendu (%)"
          results: "Resultats"
          years_to_retire: "Annees avant la retraite"
          projected_savings: "Epargne projetee"
          estimated_monthly_income: "Revenu mensuel estime"
          copy_results: "Copier les resultats"
        faq:
          q1: "De combien d'argent ai-je besoin pour la retraite?"
          a1: "Le montant depend de votre style de vie souhaite, des depenses prevues et de la duree de votre retraite. Une regle courante est d'epargner 25 fois vos depenses annuelles prevues."
          q2: "Qu'est-ce que la regle des 4% pour la retraite?"
          a2: "La regle des 4% suggere que les retraites peuvent retirer 4% de leur epargne la premiere annee et ajuster a l'inflation chaque annee suivante sans epuiser leurs fonds pendant au moins 30 ans."
          q3: "Quand devrais-je commencer a epargner pour la retraite?"
          a3: "Le plus tot vous commencez, plus votre argent a de temps pour croitre grace aux interets composes. Commencer dans la vingtaine signifie que meme de petites contributions mensuelles peuvent devenir substantielles."
          q4: "Comment les interets composes affectent-ils mon epargne-retraite?"
          a4: "Les interets composes signifient que vous gagnez des rendements non seulement sur vos contributions initiales, mais aussi sur les interets accumules des annees precedentes."
          q5: "Devrais-je contribuer davantage a la retraite en vieillissant?"
          a5: "Oui, augmenter vos contributions a mesure que votre revenu augmente est une strategie judicieuse. De nombreux conseillers financiers recommandent d'epargner 10-15% de votre revenu brut pour la retraite."
