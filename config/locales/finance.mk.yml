        faq:
          q1: "Кога е потребна детална фактура наместо стандардна?"
          a1: "Деталната фактура е потребна кога имате ставки со различни даночни стапки, кога нудите индивидуални попусти по ставка, или кога клиентот бара детален преглед со шифри на производи и типови на единици."
          q2: "Како правилно да се применат попусти на фактура?"
          a2: "Попустите можат да бидат во процент (на пр. 10% од единечната цена) или како фиксен износ (на пр. 500 денари). Важно е јасно да се наведе типот на попуст и тој да се примени пред пресметката на данокот."
          q3: "Зошто е важно да се наведат шифри на ставки?"
          a3: "Шифрите на ставки овозможуваат полесно следење на залихите, побрзо пронаоѓање на производи и поефикасно сметководство. Тие се особено важни за бизниси со голем број на производи или услуги."
          q4: "Како се постапува кога различни ставки имаат различни даночни стапки?"
          a4: "Кога ставките имаат различни даночни стапки, данокот се пресметува поединечно за секоја ставка. Вкупниот данок е збирот на сите поединечни даночни износи. Ова е вообичаено кога се продаваат производи и услуги со различни ДДВ стапки."
          q5: "Кои типови на единици најчесто се користат на фактури?"
          a5: "Најчести типови на единици се: парче (пар.), килограм (кг), литар (л), метар (м), час, услуга и комплет. Изборот зависи од природата на производот или услугата што се фактурира."
