    category_name: "Финансии"
    calculators:
      mortgage:
        title: "Калкулатор за хипотека - Бесплатна онлајн алатка"
        description: "Пресметајте ја вашата месечна рата за хипотека, вкупната камата и вкупниот трошок на вашиот станбен кредит. Бесплатен калкулатор за хипотека со моментални резултати."
        h1: "Калкулатор за хипотека"
        intro: "Проценете ја вашата месечна рата за хипотека, вкупната камата и вкупниот трошок на вашиот станбен кредит."
        breadcrumb: "Калкулатор за хипотека"
        labels:
          home_price: "Цена на имотот ($)"
          annual_interest_rate: "Годишна каматна стапка (%)"
          loan_term: "Рок на кредитот (Години)"
          results: "Резултати"
          monthly_payment: "Месечна рата"
          total_paid: "Вкупно платено"
          total_interest: "Вкупна камата"
          number_of_payments: "Број на плаќања"
          copy_results: "Копирај резултати"
        faq:
          q1: "Како се пресметува месечната рата за хипотека?"
          a1: "Месечната рата за хипотека се пресметува со формулата M = P[r(1+r)^n] / [(1+r)^n - 1], каде P е износот на кредитот, r е месечната каматна стапка (годишната стапка поделена со 12), а n е вкупниот број на месечни рати (години помножено со 12)."
          q2: "Која е добра каматна стапка за хипотека?"
          a2: "Добрата каматна стапка за хипотека зависи од тековните пазарни услови, вашиот кредитен рејтинг и видот на кредитот. Генерално, стапките помеѓу 3% и 7% се вообичаени за хипотеки со фиксна каматна стапка."
          q3: "Колкав стан можам да си дозволам?"
          a3: "Вообичаена препорака е вашата месечна рата за хипотека да не надминува 28% од вашиот бруто месечен приход."
          q4: "Која е разликата помеѓу хипотека од 15 и 30 години?"
          a4: "Кредитот од 15 години има повисоки месечни рати, но значително помала вкупна камата. Кредитот од 30 години нуди пониски месечни рати, но чини повеќе во вкупна камата."
          q5: "Дали треба да правам дополнителни уплати за хипотеката?"
          a5: "Дополнителните уплати можат да ви заштедат илјадници во камата и да ви помогнат побрзо да ја отплатите хипотеката. Прво проверете дали вашиот кредитор наплатува казни за предвремено отплаќање."
      compound_interest:
        title: "Калкулатор за сложена камата - Бесплатна онлајн алатка"
        description: "Пресметајте ја сложената камата на вашите заштеди или инвестиции. Видете како вашите пари растат со различни фреквенции на капитализација."
        h1: "Калкулатор за сложена камата"
        intro: "Видете како вашите пари растат со текот на времето благодарение на моќта на сложената камата."
        breadcrumb: "Калкулатор за сложена камата"
        labels:
          initial_principal: "Почетен капитал ($)"
          annual_interest_rate: "Годишна каматна стапка (%)"
          time_period: "Период (Години)"
          compounding_frequency: "Фреквенција на капитализација"
          annually: "Годишно (1x/год)"
          semi_annually: "Полугодишно (2x/год)"
          quarterly: "Квартално (4x/год)"
          monthly: "Месечно (12x/год)"
          daily: "Дневно (365x/год)"
          results: "Резултати"
          future_value: "Идна вредност"
          total_interest_earned: "Вкупна заработена камата"
          initial_principal_display: "Почетен капитал"
          copy_results: "Копирај резултати"
        faq:
          q1: "Што е сложена камата?"
          a1: "Сложената камата е камата пресметана на почетниот капитал и на акумулираната камата од претходните периоди. За разлика од простата камата, сложената камата овозможува вашите пари да растат експоненцијално."
          q2: "Колку често треба каматата да се капитализира?"
          a2: "Почестата капитализација дава повисоки приноси. Дневната капитализација донесува малку повеќе од месечната, која донесува повеќе од кварталната или годишната."
          q3: "Што е правилото од 72?"
          a3: "Правилото од 72 е брз начин да процените колку време е потребно за инвестицијата да се удвои. Поделете 72 со годишната каматна стапка. При 6%, вашите пари се удвојуваат за околу 12 години."
          q4: "Која е разликата помеѓу НКС и ЕКС?"
          a4: "НКС е номиналната годишна каматна стапка без да се земе предвид капитализацијата. ЕКС ги вклучува ефектите на капитализацијата и го одразува реалниот принос што го заработувате за една година."
          q5: "Како сложената камата се разликува од простата камата?"
          a5: "Простата камата се пресметува само на почетниот капитал. Сложената камата се пресметува на капиталот плус сите претходно заработени камати. На долг рок, сложената камата генерира значително повеќе богатство."
      loan:
        title: "Калкулатор за кредит - Бесплатна онлајн алатка"
        description: "Пресметајте ги месечните рати, вкупната камата и вкупниот трошок за секој вид кредит. Бесплатен калкулатор за кредит со моментални резултати."
        h1: "Калкулатор за кредит"
        intro: "Пресметајте ги месечните рати, вкупната камата и вкупниот трошок за секој вид кредит."
        breadcrumb: "Калкулатор за кредит"
        labels:
          loan_amount: "Износ на кредитот ($)"
          annual_interest_rate: "Годишна каматна стапка (%)"
          loan_term: "Рок на кредитот (Години)"
          results: "Резултати"
          monthly_payment: "Месечна рата"
          total_paid: "Вкупно платено"
          total_interest: "Вкупна камата"
          number_of_payments: "Број на плаќања"
          copy_results: "Копирај резултати"
        faq:
          q1: "Како се пресметуваат месечните рати на кредитот?"
          a1: "Месечните рати на кредитот се пресметуваат со формулата за амортизација: M = P[r(1+r)^n] / [(1+r)^n - 1], каде P е износот на кредитот, r е месечната каматна стапка, а n е вкупниот број на плаќања."
          q2: "Кои фактори влијаат на каматните стапки за кредити?"
          a2: "Каматните стапки зависат од вашиот кредитен рејтинг, приходите, износот и рокот на кредитот, обезбедувањето и тековните пазарни услови."
          q3: "Дали е подобро да се избере покус или подолг рок на кредитот?"
          a3: "Покусиот рок значи повисоки месечни рати, но помала вкупна камата. Подолгиот рок ја намалува месечната рата, но чини повеќе вкупно."
          q4: "Која е разликата помеѓу обезбедени и необезбедени кредити?"
          a4: "Обезбедените кредити се поткрепени со имот, како автомобил или куќа. Необезбедените кредити немаат обезбедување и затоа имаат повисоки каматни стапки."
          q5: "Може ли да го отплатам кредитот предвремено за да заштедам на камата?"
          a5: "Да, предвременото отплаќање може значително да ви заштеди на камата. Сепак, некои кредитори наплатуваат казни за предвремено отплаќање. Проверете го вашиот договор за кредит пред да правите дополнителни уплати."
      investment:
        title: "Калкулатор за инвестиции - Бесплатна онлајн алатка"
        description: "Проектирајте ја идната вредност на вашите инвестиции со редовни месечни придонеси. Видете како вашето портфолио расте со текот на времето."
        h1: "Калкулатор за инвестиции"
        intro: "Проектирајте како вашите инвестиции растат со текот на времето со почетен депозит и редовни месечни придонеси."
        breadcrumb: "Калкулатор за инвестиции"
        labels:
          initial_investment: "Почетна инвестиција ($)"
          monthly_contribution: "Месечен придонес ($)"
          expected_annual_return: "Очекуван годишен принос (%)"
          investment_period: "Период на инвестирање (Години)"
          results: "Резултати"
          future_value: "Идна вредност"
          total_contributions: "Вкупни придонеси"
          investment_growth: "Раст на инвестицијата"
          copy_results: "Копирај резултати"
        faq:
          q1: "Како функционира калкулаторот за инвестиции?"
          a1: "Калкулаторот за инвестиции ја проектира идната вредност на вашите пари со примена на сложен раст на вашата почетна инвестиција и редовните месечни придонеси."
          q2: "Кој е реалистичен годишен принос за инвестиции?"
          a2: "Историскиот просечен годишен принос на S&P 500 е околу 10% пред инфлација, односно околу 7% по инфлација. Балансираното портфолио може да очекува 6-8% годишно на долг рок."
          q3: "Колку треба да инвестирам секој месец?"
          a3: "Вообичаена препорака е да инвестирате најмалку 15-20% од вашиот бруто приход за пензија. Започнете со она што можете да си го дозволите и зголемувајте ги придонесите со текот на времето."
          q4: "Што е програмирано инвестирање?"
          a4: "Програмираното инвестирање подразбира инвестирање на фиксен износ во редовни интервали, без оглед на пазарните услови. Купувате повеќе удели кога цените се ниски и помалку кога се високи."
          q5: "Дали треба да инвестирам еднократна сума или да ја распоредам во времето?"
          a5: "Студиите покажуваат дека еднократното инвестирање го надминува програмираното инвестирање околу две третини од времето, бидејќи пазарите имаат тенденција да растат со текот на времето."
      retirement:
        title: "Калкулатор за пензија - Бесплатна онлајн алатка"
        description: "Планирајте ја вашата пензија со нашиот бесплатен калкулатор. Проценете ги проектираните заштеди, месечниот пензиски приход и годините до пензионирање."
        h1: "Калкулатор за пензија"
        intro: "Проценете колку ќе имате заштедено за пензија и каков месечен приход ќе може да обезбеди вашиот имот."
        breadcrumb: "Калкулатор за пензија"
        labels:
          current_age: "Тековна возраст"
          retirement_age: "Возраст за пензионирање"
          current_savings: "Тековни заштеди ($)"
          monthly_contribution: "Месечен придонес ($)"
          expected_annual_return: "Очекуван годишен принос (%)"
          results: "Резултати"
          years_to_retire: "Години до пензија"
          projected_savings: "Проектирани заштеди"
          estimated_monthly_income: "Проценет месечен приход"
          copy_results: "Копирај резултати"
        faq:
          q1: "Колку пари ми се потребни за пензија?"
          a1: "Износот зависи од вашиот посакуван начин на живот, предвидените трошоци и должината на вашата пензија. Вообичаено правило е да заштедите 25 пати повеќе од вашите планирани годишни трошоци."
          q2: "Што е правилото од 4% за пензија?"
          a2: "Правилото од 4% сугерира дека пензионерите можат да повлечат 4% од своите заштеди во првата година и да го прилагодуваат за инфлација секоја следна година без да ги исцрпат средствата за најмалку 30 години."
          q3: "Кога треба да почнам да штедам за пензија?"
          a3: "Колку порано почнете, толку повеќе време вашите пари имаат да растат благодарение на сложената камата. Почнувањето во дваесеттите значи дека дури и мали месечни придонеси можат да станат значителни."
          q4: "Како сложената камата влијае на моите пензиски заштеди?"
          a4: "Сложената камата значи дека заработувате приноси не само на вашите почетни придонеси, туку и на акумулираната камата од претходните години."
          q5: "Дали треба да придонесувам повеќе за пензија како што старееме?"
          a5: "Да, зголемувањето на вашите придонеси како што расте вашиот приход е мудра стратегија. Многу финансиски советници препорачуваат да штедите 10-15% од вашиот бруто приход за пензија."
