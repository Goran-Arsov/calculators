          category_essential: "Grasa esencial"
          category_athletes: "Atletas"
          category_fitness: "Fitness"
          category_average: "Promedio"
          category_obese: "Obeso"
          copy_results: "Copiar resultados"
        faq:
          q1: "Como funciona la formula de grasa corporal de la Marina de EE.UU.?"
          a1: "El metodo de la Marina de EE.UU. estima el porcentaje de grasa corporal usando medidas de circunferencia. Para hombres, la formula usa medidas de cintura, cuello y altura. Para mujeres, se agrega una medida de cadera."
          q2: "Cual es un porcentaje de grasa corporal saludable?"
          a2: "Los rangos saludables difieren por sexo. Para hombres: 6-13% atletico, 14-17% en forma, 18-24% aceptable, mas de 25% obeso. Para mujeres: 14-20% atletico, 21-24% en forma, 25-31% aceptable, mas de 32% obeso."
          q3: "Es el porcentaje de grasa corporal mas util que el IMC?"
          a3: "El porcentaje de grasa corporal proporciona una imagen mas precisa de la composicion corporal que el IMC porque estima directamente la masa grasa en lugar de simplemente relacionar peso con altura."
          q4: "Que tan preciso es el metodo de grasa corporal de la Marina de EE.UU.?"
          a4: "El metodo de la Marina de EE.UU. es preciso dentro de un 3-4% de grasa corporal para la mayoria de las personas cuando las medidas se toman correctamente."
          q5: "Como debo tomar las medidas corporales para esta calculadora?"
          a5: "Mida su cintura en el punto mas estrecho (a la altura del ombligo para hombres). Mida su cuello justo debajo de la laringe. Mida las caderas (solo mujeres) en el punto mas ancho de los gluteos."
      tdee:
        title: "Calculadora TDEE - Herramienta Gratuita de Gasto Energetico Total"
        description: "Calcule su gasto energetico total diario (TDEE) y tasa metabolica basal (BMR) con nuestra calculadora gratuita."
        h1: "Calculadora TDEE"
        intro: "Calcule su gasto energetico total diario y tasa metabolica basal para entender cuantas calorias quema cada dia."
        breadcrumb: "Calculadora TDEE"
        labels:
          weight: "Peso (kg)"
          height: "Altura (cm)"
          age: "Edad (anos)"
          gender: "Sexo"
          male: "Masculino"
          female: "Femenino"
          activity_level: "Nivel de actividad"
          sedentary: "Sedentario (poco o nada de ejercicio)"
          light: "Ligeramente activo (1-3 dias/semana)"
          moderate: "Moderadamente activo (3-5 dias/semana)"
          active: "Muy activo (6-7 dias/semana)"
          extra: "Extremadamente activo (intenso diario + trabajo fisico)"
          results: "Resultados"
          bmr: "Tasa Metabolica Basal (BMR)"
          tdee: "TDEE"
          copy_results: "Copiar resultados"
        faq:
          q1: "Que es TDEE y por que es importante?"
          a1: "TDEE significa Total Daily Energy Expenditure - el numero total de calorias que su cuerpo quema en un dia. Conocer su TDEE es esencial para controlar su peso."
          q2: "Cual es la diferencia entre BMR y TDEE?"
          a2: "El BMR es el numero de calorias que su cuerpo necesita en reposo completo. El TDEE toma su BMR y lo multiplica por un factor de actividad."
          q3: "Que formula se usa para calcular el BMR?"
          a3: "Esta calculadora usa la ecuacion de Mifflin-St Jeor. Para hombres: BMR = (10 x peso en kg) + (6,25 x altura en cm) - (5 x edad) + 5."
          q4: "Como elijo el nivel de actividad correcto?"
          a4: "Sedentario significa poco o nada de ejercicio. Ligeramente activo significa ejercicio ligero 1-3 dias por semana. Moderadamente activo significa ejercicio moderado 3-5 dias por semana. En caso de duda, elija un nivel mas bajo."
          q5: "Como debo usar TDEE para perder peso o ganar musculo?"
          a5: "Para perder peso, coma 300-500 calorias por debajo de su TDEE. Para ganar musculo, coma 200-400 calorias por encima de su TDEE combinado con entrenamiento de resistencia."
      macro:
        title: "Calculadora de Macros - Herramienta Gratuita de Macronutrientes"
        description: "Calcule su distribucion ideal de macronutrientes con nuestra calculadora gratuita. Objetivos personalizados de proteinas, carbohidratos y grasas."
        h1: "Calculadora de Macros"
        intro: "Calcule sus objetivos diarios ideales de proteinas, carbohidratos y grasas segun su ingesta calorica y objetivo fitness."
        breadcrumb: "Calculadora de Macros"
        labels:
          daily_calories: "Calorias diarias"
          goal: "Objetivo"
          maintain: "Mantener peso"
          cut: "Definicion (perdida de grasa)"
          bulk: "Volumen (ganancia muscular)"
          results: "Resultados"
          protein: "Proteinas"
          carbs: "Carbohidratos"
          fat: "Grasas"
          copy_results: "Copiar resultados"
        faq:
          q1: "Que son los macronutrientes y por que son importantes?"
          a1: "Los macronutrientes - proteinas, carbohidratos y grasas - son los tres nutrientes principales que su cuerpo necesita en grandes cantidades. Cada uno juega un papel unico en la composicion corporal, niveles de energia y rendimiento."
          q2: "Cuantos gramos de proteina necesito por dia?"
          a2: "Las necesidades de proteina dependen de sus objetivos y nivel de actividad. Para salud general, 0,8 g por kg de peso corporal es suficiente. Para construccion muscular, se recomiendan 1,6 a 2,2 g por kg."
          q3: "Cual es la mejor proporcion de macros para perder peso?"
          a3: "Una distribucion comun para perdida de peso es 40% proteinas, 35% carbohidratos y 25% grasas. La mayor ingesta de proteinas ayuda a preservar la masa muscular durante un deficit calorico."
          q4: "Cual es la mejor proporcion de macros para ganar musculo?"
          a4: "Para ganancia muscular, una distribucion tipica es 30% proteinas, 45% carbohidratos y 25% grasas. Los carbohidratos mas altos alimentan los entrenamientos intensos y apoyan la recuperacion."
          q5: "Necesito rastrear los macros exactamente cada dia?"
          a5: "El rastreo diario exacto no es necesario para la mayoria de las personas. Alcanzar sus objetivos de macros dentro de mas o menos 10% generalmente es suficiente para ver resultados."
