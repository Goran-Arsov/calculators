    category_name: "Salud"
    calculators:
      bmi:
        title: "Calculadora de IMC - Herramienta Gratuita de Indice de Masa Corporal"
        description: "Calcule su Indice de Masa Corporal (IMC) instantaneamente con nuestra calculadora gratuita. Soporta unidades metricas e imperiales. Encuentre su categoria de peso y rango de peso saludable."
        h1: "Calculadora de IMC"
        intro: "Calcule su Indice de Masa Corporal y descubra si su peso esta dentro de un rango saludable."
        breadcrumb: "Calculadora de IMC"
        labels:
          unit_system: "Sistema de unidades"
          metric: "Metrico (kg, cm)"
          imperial: "Imperial (lbs, in)"
          weight: "Peso (kg)"
          weight_imperial: "Peso (lbs)"
          height: "Altura (cm)"
          height_imperial: "Altura (pulgadas)"
          results: "Resultados"
          your_bmi: "Su IMC"
          category: "Categoria"
          category_underweight: "Bajo peso"
          category_normal: "Peso normal"
          category_overweight: "Sobrepeso"
          category_obese: "Obeso"
          healthy_weight_min: "Peso saludable Min"
          healthy_weight_max: "Peso saludable Max"
          copy_results: "Copiar resultados"
        faq:
          q1: "Que es el IMC y como se calcula?"
          a1: "El IMC (Indice de Masa Corporal) es una medida simple de la grasa corporal basada en el peso y la altura. Se calcula dividiendo el peso en kilogramos por el cuadrado de la altura en metros (kg/m2)."
          q2: "Cual es el rango de IMC saludable?"
          a2: "Un IMC saludable para la mayoria de los adultos esta entre 18,5 y 24,9. Un IMC por debajo de 18,5 se considera bajo peso, de 25 a 29,9 sobrepeso y de 30 o mas como obeso."
          q3: "Es preciso el IMC para atletas y personas musculosas?"
          a3: "El IMC puede sobreestimar la grasa corporal en atletas porque no distingue entre musculo y grasa. El porcentaje de grasa corporal puede ser una medida mas util para estas personas."
          q4: "Difiere el IMC segun la edad y el sexo?"
          a4: "La formula estandar del IMC es la misma para todos los adultos. Sin embargo, la interpretacion puede variar. Para ninos y adolescentes, el IMC se interpreta usando percentiles especificos por edad y sexo."
          q5: "Que debo hacer si mi IMC esta fuera del rango saludable?"
          a5: "Si su IMC esta fuera del rango saludable, consulte a un profesional de la salud antes de hacer cambios. Puede evaluar su salud general y recomendar un plan personalizado."
      calorie:
        title: "Calculadora de Calorias - Herramienta Gratuita de Necesidades Caloricas"
        description: "Calcule sus necesidades caloricas diarias con nuestra calculadora gratuita. Estima BMR y TDEE segun edad, sexo, peso, altura y nivel de actividad."
        h1: "Calculadora de Calorias"
        intro: "Estime sus necesidades caloricas diarias para mantenimiento, perdida o aumento de peso segun sus datos personales y nivel de actividad."
        breadcrumb: "Calculadora de Calorias"
        labels:
          unit_system: "Sistema de unidades"
