          male: "Masculino"
          female: "Femenino"
          weight: "Peso (kg)"
          weight_imperial: "Peso (lbs)"
          height: "Altura (cm)"
          height_imperial: "Altura (pulgadas)"
          activity_level: "Nivel de actividad"
          sedentary: "Sedentario (poco o nada de ejercicio)"
          light: "Ligero (1-3 dias/semana)"
          moderate: "Moderado (3-5 dias/semana)"
          active: "Activo (6-7 dias/semana)"
          very_active: "Muy activo (ejercicio intenso diario)"
          results: "Resultados"
          bmr: "Tasa Metabolica Basal (BMR)"
          maintenance: "Mantenimiento (TDEE)"
          mild_loss: "Perdida leve (-0,25 kg/sem)"
          weight_loss: "Perdida de peso (-0,5 kg/sem)"
          mild_gain: "Aumento leve (+0,25 kg/sem)"
          weight_gain: "Aumento de peso (+0,5 kg/sem)"
          copy_results: "Copiar resultados"
        faq:
          q1: "Cuantas calorias necesito por dia?"
          a1: "Las necesidades caloricas diarias varian segun la edad, sexo, peso, altura y nivel de actividad. La mujer adulta promedio necesita aproximadamente 1.600 a 2.400 calorias por dia, el hombre adulto promedio aproximadamente 2.000 a 3.000."
          q2: "Cual es la diferencia entre BMR y TDEE?"
          a2: "El BMR (tasa metabolica basal) es el numero de calorias que su cuerpo quema en reposo completo. El TDEE es su BMR multiplicado por un factor de actividad."
          q3: "Cuantas calorias debo comer para perder peso?"
          a3: "Una tasa segura de perdida de peso es de 0,5 a 1 kg por semana, lo que requiere un deficit diario de aproximadamente 500 a 1.000 calorias por debajo de su TDEE."
          q4: "Que es la ecuacion de Mifflin-St Jeor?"
          a4: "La ecuacion de Mifflin-St Jeor se considera la formula mas precisa para estimar el BMR. Para hombres: BMR = (10 x peso en kg) + (6,25 x altura en cm) - (5 x edad) + 5."
          q5: "El ejercicio aumenta el numero de calorias que necesito?"
          a5: "Si, la actividad fisica aumenta su gasto energetico total diario. Cuanto mas intenso y frecuente sea su ejercicio, mas calorias quema."
      body_fat:
        title: "Calculadora de Grasa Corporal - Herramienta Gratuita"
        description: "Estime su porcentaje de grasa corporal con nuestra calculadora gratuita usando el metodo de la Marina de EE.UU. Ingrese sus medidas en unidades metricas o imperiales."
        h1: "Calculadora de Grasa Corporal"
