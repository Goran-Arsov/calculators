de:
  health:
    category_name: "Gesundheit"
    calculators:
      bmi:
        title: "BMI-Rechner - Kostenloses Body-Mass-Index-Tool"
        description: "Berechnen Sie Ihren Body-Mass-Index (BMI) sofort mit unserem kostenlosen Online-Rechner. Unterstuetzt metrische und imperiale Einheiten. Finden Sie Ihre Gewichtskategorie und den gesunden Gewichtsbereich."
        h1: "BMI-Rechner"
        intro: "Berechnen Sie Ihren Body-Mass-Index und finden Sie heraus, ob Ihr Gewicht im gesunden Bereich liegt."
        breadcrumb: "BMI-Rechner"
        labels:
          unit_system: "Einheitensystem"
          metric: "Metrisch (kg, cm)"
          imperial: "Imperial (lbs, in)"
          weight: "Gewicht (kg)"
          weight_imperial: "Gewicht (lbs)"
          height: "Groesse (cm)"
          height_imperial: "Groesse (Zoll)"
          results: "Ergebnisse"
          your_bmi: "Ihr BMI"
          category: "Kategorie"
          category_underweight: "Untergewicht"
          category_normal: "Normalgewicht"
          category_overweight: "Übergewicht"
          category_obese: "Adipös"
          healthy_weight_min: "Gesundes Gewicht Min"
          healthy_weight_max: "Gesundes Gewicht Max"
          copy_results: "Ergebnisse kopieren"
        faq:
          q1: "Was ist BMI und wie wird er berechnet?"
          a1: "BMI (Body-Mass-Index) ist ein einfaches Mass fuer das Koerperfett basierend auf Gewicht und Groesse. Er wird berechnet, indem das Gewicht in Kilogramm durch das Quadrat der Groesse in Metern geteilt wird (kg/m2)."
          q2: "Was ist ein gesunder BMI-Bereich?"
          a2: "Ein gesunder BMI fuer die meisten Erwachsenen liegt zwischen 18,5 und 24,9. Ein BMI unter 18,5 gilt als Untergewicht, 25 bis 29,9 als Uebergewicht und 30 oder darueber als adipoes."
          q3: "Ist der BMI fuer Sportler und muskuloese Menschen genau?"
          a3: "Der BMI kann das Koerperfett bei Sportlern und Menschen mit hoher Muskelmasse ueberschaetzen, da er nicht zwischen Muskeln und Fett unterscheidet. Fuer solche Personen sind Koerperfettanteil oder Taille-Huefte-Verhaeltnis nuetzlichere Messungen."
          q4: "Unterscheidet sich der BMI nach Alter und Geschlecht?"
          a4: "Die Standard-BMI-Formel ist fuer alle Erwachsenen gleich, unabhaengig von Alter und Geschlecht. Die Interpretation kann jedoch variieren. Bei Kindern und Jugendlichen wird der BMI anhand alters- und geschlechtsspezifischer Perzentilen interpretiert."
          q5: "Was soll ich tun, wenn mein BMI ausserhalb des gesunden Bereichs liegt?"
          a5: "Wenn Ihr BMI ausserhalb des gesunden Bereichs liegt, konsultieren Sie einen Arzt, bevor Sie Aenderungen vornehmen. Er kann Ihre allgemeine Gesundheit beurteilen und einen personalisierten Plan empfehlen."
      calorie:
        title: "Kalorienrechner - Kostenloses Tool fuer den taeglichen Kalorienbedarf"
        description: "Berechnen Sie Ihren taeglichen Kalorienbedarf mit unserem kostenlosen Kalorienrechner. Schaetzt BMR und TDEE basierend auf Alter, Geschlecht, Gewicht, Groesse und Aktivitaetsniveau."
        h1: "Kalorienrechner"
        intro: "Schaetzen Sie Ihren taeglichen Kalorienbedarf fuer Erhaltung, Gewichtsverlust oder Gewichtszunahme basierend auf Ihren persoenlichen Daten und Ihrem Aktivitaetsniveau."
        breadcrumb: "Kalorienrechner"
        labels:
          unit_system: "Einheitensystem"
          metric: "Metrisch (kg, cm)"
          imperial: "Imperial (lbs, in)"
          age: "Alter (Jahre)"
          sex: "Geschlecht"
          male: "Maennlich"
          female: "Weiblich"
          weight: "Gewicht (kg)"
          weight_imperial: "Gewicht (lbs)"
          height: "Groesse (cm)"
          height_imperial: "Groesse (Zoll)"
          activity_level: "Aktivitaetsniveau"
          sedentary: "Sitzend (wenig oder keine Bewegung)"
          light: "Leicht (1-3 Tage/Woche)"
          moderate: "Maessig (3-5 Tage/Woche)"
          active: "Aktiv (6-7 Tage/Woche)"
          very_active: "Sehr aktiv (intensives taegliches Training)"
          results: "Ergebnisse"
          bmr: "Grundumsatz (BMR)"
          maintenance: "Erhaltung (TDEE)"
          mild_loss: "Leichter Gewichtsverlust (-0,25 kg/Wo)"
          weight_loss: "Gewichtsverlust (-0,5 kg/Wo)"
          mild_gain: "Leichte Zunahme (+0,25 kg/Wo)"
          weight_gain: "Gewichtszunahme (+0,5 kg/Wo)"
          copy_results: "Ergebnisse kopieren"
        faq:
          q1: "Wie viele Kalorien brauche ich pro Tag?"
          a1: "Der taegliche Kalorienbedarf variiert je nach Alter, Geschlecht, Gewicht, Groesse und Aktivitaetsniveau. Die durchschnittliche erwachsene Frau benoetigt etwa 1.600 bis 2.400 Kalorien pro Tag, der durchschnittliche erwachsene Mann etwa 2.000 bis 3.000."
          q2: "Was ist der Unterschied zwischen BMR und TDEE?"
          a2: "BMR (Basal Metabolic Rate) ist die Anzahl der Kalorien, die Ihr Koerper in voelliger Ruhe verbrennt. TDEE (Total Daily Energy Expenditure) ist Ihr BMR multipliziert mit einem Aktivitaetsfaktor."
          q3: "Wie viele Kalorien sollte ich essen, um Gewicht zu verlieren?"
          a3: "Eine sichere Gewichtsabnahme betraegt 0,5 bis 1 kg pro Woche, was ein taegliches Defizit von etwa 500 bis 1.000 Kalorien unter Ihrem TDEE erfordert."
          q4: "Was ist die Mifflin-St-Jeor-Gleichung?"
          a4: "Die Mifflin-St-Jeor-Gleichung gilt als die genaueste Formel zur Schaetzung des BMR. Fuer Maenner: BMR = (10 x Gewicht in kg) + (6,25 x Groesse in cm) - (5 x Alter) + 5."
          q5: "Erhoeht Bewegung die Anzahl der benoetigten Kalorien?"
          a5: "Ja, koerperliche Aktivitaet erhoeht Ihren taeglichen Gesamtenergieverbrauch. Je intensiver und haeufiger Ihre Bewegung, desto mehr Kalorien verbrennen Sie."
      body_fat:
        title: "Koerperfettrechner - Kostenloses Koerperfettanteil-Tool"
        description: "Schaetzen Sie Ihren Koerperfettanteil mit unserem kostenlosen Rechner nach der U.S.-Navy-Methode. Geben Sie Ihre Masse in metrischen oder imperialen Einheiten ein."
        h1: "Koerperfettrechner"
        intro: "Schaetzen Sie Ihren Koerperfettanteil mit der U.S.-Navy-Methode anhand einfacher Koerpermasse."
        breadcrumb: "Koerperfettrechner"
        labels:
          sex: "Geschlecht"
          male: "Maennlich"
          female: "Weiblich"
          unit_system: "Einheitensystem"
          metric: "Metrisch (cm)"
          imperial: "Imperial (in)"
          waist: "Taille (cm)"
          waist_imperial: "Taille (Zoll)"
          neck: "Hals (cm)"
          neck_imperial: "Hals (Zoll)"
          height: "Groesse (cm)"
          height_imperial: "Groesse (Zoll)"
          hip: "Huefte (cm)"
          hip_imperial: "Huefte (Zoll)"
          results: "Ergebnisse"
          body_fat_percentage: "Koerperfettanteil"
          category: "Kategorie"
          category_essential: "Essentielles Fett"
          category_athletes: "Sportler"
          category_fitness: "Fitness"
          category_average: "Durchschnitt"
          category_obese: "Adipös"
          copy_results: "Ergebnisse kopieren"
        faq:
          q1: "Wie funktioniert die U.S.-Navy-Koerperfettformel?"
          a1: "Die U.S.-Navy-Methode schaetzt den Koerperfettanteil anhand von Umfangsmessungen. Fuer Maenner verwendet die Formel Taille-, Hals- und Groessenmessungen. Fuer Frauen wird zusaetzlich eine Hueftmessung hinzugefuegt."
          q2: "Was ist ein gesunder Koerperfettanteil?"
          a2: "Gesunde Koerperfettbereiche unterscheiden sich nach Geschlecht. Fuer Maenner: 6-13% sportlich, 14-17% fit, 18-24% akzeptabel, ueber 25% adipoes. Fuer Frauen: 14-20% sportlich, 21-24% fit, 25-31% akzeptabel, ueber 32% adipoes."
          q3: "Ist der Koerperfettanteil nuetzlicher als der BMI?"
          a3: "Der Koerperfettanteil liefert ein genaueres Bild der Koerperzusammensetzung als der BMI, da er die Fettmasse direkt schaetzt, anstatt einfach Gewicht und Groesse in Beziehung zu setzen."
          q4: "Wie genau ist die U.S.-Navy-Koerperfettmethode?"
          a4: "Die U.S.-Navy-Methode ist bei korrekt durchgefuehrten Messungen auf etwa 3-4% Koerperfett genau. Sie ist weniger genau als DEXA-Scans, aber zugaenglicher und kostenlos."
          q5: "Wie soll ich die Koerpermasse fuer diesen Rechner nehmen?"
          a5: "Messen Sie die Taille am schmalsten Punkt (am Nabel fuer Maenner). Messen Sie den Hals knapp unterhalb des Kehlkopfs. Messen Sie die Huefte (nur Frauen) am breitesten Punkt des Gesaesses."
      tdee:
        title: "TDEE-Rechner - Kostenloses Tool fuer den Gesamtenergieverbrauch"
        description: "Berechnen Sie Ihren Gesamtenergieverbrauch (TDEE) und Grundumsatz (BMR) mit unserem kostenlosen Rechner. Geben Sie Gewicht, Groesse, Alter, Geschlecht und Aktivitaetsniveau ein."
        h1: "TDEE-Rechner"
        intro: "Berechnen Sie Ihren Gesamtenergieverbrauch und Grundumsatz, um zu verstehen, wie viele Kalorien Sie taeglich verbrennen."
        breadcrumb: "TDEE-Rechner"
        labels:
          weight: "Gewicht (kg)"
          height: "Groesse (cm)"
          age: "Alter (Jahre)"
          gender: "Geschlecht"
          male: "Maennlich"
          female: "Weiblich"
          activity_level: "Aktivitaetsniveau"
          sedentary: "Sitzend (wenig oder keine Bewegung)"
          light: "Leicht aktiv (1-3 Tage/Woche)"
          moderate: "Maessig aktiv (3-5 Tage/Woche)"
          active: "Sehr aktiv (6-7 Tage/Woche)"
          extra: "Extrem aktiv (intensiv taeglich + koerperliche Arbeit)"
          results: "Ergebnisse"
          bmr: "Grundumsatz (BMR)"
          tdee: "TDEE"
          copy_results: "Ergebnisse kopieren"
        faq:
          q1: "Was ist TDEE und warum ist es wichtig?"
          a1: "TDEE steht fuer Total Daily Energy Expenditure (Gesamtenergieverbrauch) - die Gesamtzahl der Kalorien, die Ihr Koerper an einem Tag verbrennt. Das Wissen um Ihren TDEE ist entscheidend fuer die Gewichtskontrolle."
          q2: "Was ist der Unterschied zwischen BMR und TDEE?"
          a2: "BMR (Grundumsatz) ist die Kalorienanzahl, die Ihr Koerper in voelliger Ruhe benoetigt. TDEE nimmt Ihren BMR und multipliziert ihn mit einem Aktivitaetsfaktor."
          q3: "Welche Formel wird zur Berechnung des BMR verwendet?"
          a3: "Dieser Rechner verwendet die Mifflin-St-Jeor-Gleichung. Fuer Maenner: BMR = (10 x Gewicht in kg) + (6,25 x Groesse in cm) - (5 x Alter) + 5."
          q4: "Wie waehle ich das richtige Aktivitaetsniveau?"
          a4: "Sitzend bedeutet wenig oder keine Bewegung. Leicht aktiv bedeutet leichte Bewegung 1-3 Tage pro Woche. Maessig aktiv bedeutet maessige Bewegung 3-5 Tage pro Woche. Im Zweifel waehlen Sie eine Stufe niedriger."
          q5: "Wie sollte ich TDEE fuer Gewichtsverlust oder Muskelaufbau nutzen?"
          a5: "Fuer Gewichtsverlust essen Sie 300-500 Kalorien unter Ihrem TDEE. Fuer Muskelaufbau essen Sie 200-400 Kalorien ueber Ihrem TDEE kombiniert mit Krafttraining."
      macro:
        title: "Makro-Rechner - Kostenloses Makronaehrstoff-Tool"
        description: "Berechnen Sie Ihre ideale taegliche Makronaehrstoffverteilung mit unserem kostenlosen Makro-Rechner. Personalisierte Protein-, Kohlenhydrat- und Fettziele."
        h1: "Makro-Rechner"
        intro: "Berechnen Sie Ihre idealen taeglichen Protein-, Kohlenhydrat- und Fettziele basierend auf Ihrer Kalorienzufuhr und Ihrem Fitnessziel."
        breadcrumb: "Makro-Rechner"
        labels:
          daily_calories: "Taegliche Kalorien"
          goal: "Ziel"
          maintain: "Gewicht halten"
          cut: "Definitionsphase (Fettabbau)"
          bulk: "Aufbauphase (Muskelaufbau)"
          results: "Ergebnisse"
          protein: "Protein"
          carbs: "Kohlenhydrate"
          fat: "Fett"
          copy_results: "Ergebnisse kopieren"
        faq:
          q1: "Was sind Makronaehrstoffe und warum sind sie wichtig?"
          a1: "Makronaehrstoffe - Protein, Kohlenhydrate und Fett - sind die drei Hauptnaehrstoffe, die Ihr Koerper in grossen Mengen benoetigt. Jeder spielt eine einzigartige Rolle fuer Koerperzusammensetzung, Energieniveau und Leistung."
          q2: "Wie viel Gramm Protein brauche ich pro Tag?"
          a2: "Der Proteinbedarf haengt von Ihren Zielen und Ihrem Aktivitaetsniveau ab. Fuer allgemeine Gesundheit genuegen 0,8 g pro kg Koerpergewicht. Fuer Muskelaufbau werden 1,6 bis 2,2 g pro kg empfohlen."
          q3: "Was ist das beste Makroverhaeltnis fuer Gewichtsverlust?"
          a3: "Eine gaengige Makroverteilung fuer Gewichtsverlust ist 40% Protein, 35% Kohlenhydrate und 25% Fett. Die hoehere Proteinzufuhr hilft, Muskelmasse waehrend eines Kaloriendefizits zu erhalten."
          q4: "Was ist das beste Makroverhaeltnis fuer Muskelaufbau?"
          a4: "Fuer Muskelaufbau ist eine typische Verteilung 30% Protein, 45% Kohlenhydrate und 25% Fett. Die hoeheren Kohlenhydrate versorgen intensive Trainingseinheiten und unterstuetzen die Erholung."
          q5: "Muss ich Makros taeglich genau tracken?"
          a5: "Exaktes taegliches Tracking ist fuer die meisten Menschen nicht notwendig. Die Makroziele innerhalb von plus/minus 10% zu erreichen, genuegt in der Regel fuer Ergebnisse."
