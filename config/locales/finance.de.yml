        title: "Investitionsrechner - Kostenloses Online-Tool"
        description: "Projizieren Sie den zukuenftigen Wert Ihrer Investitionen mit regelmaessigen monatlichen Beitraegen. Sehen Sie, wie Ihr Portfolio im Laufe der Zeit waechst."
        h1: "Investitionsrechner"
        intro: "Projizieren Sie, wie Ihre Investitionen im Laufe der Zeit mit einer Erstanlage und regelmaessigen monatlichen Beitraegen wachsen."
        breadcrumb: "Investitionsrechner"
        labels:
          initial_investment: "Anfangsinvestition ($)"
          monthly_contribution: "Monatlicher Beitrag ($)"
          expected_annual_return: "Erwartete Jahresrendite (%)"
          investment_period: "Anlagezeitraum (Jahre)"
          results: "Ergebnisse"
          future_value: "Zukuenftiger Wert"
          total_contributions: "Gesamtbeitraege"
          investment_growth: "Anlagewachstum"
          copy_results: "Ergebnisse kopieren"
        faq:
          q1: "Wie funktioniert ein Investitionsrechner?"
          a1: "Ein Investitionsrechner projiziert den zukuenftigen Wert Ihres Geldes, indem er Zinseszinswachstum auf Ihre Erstanlage und regelmaessige monatliche Beitraege anwendet."
          q2: "Was ist eine realistische Jahresrendite fuer Investitionen?"
          a2: "Die historische durchschnittliche Jahresrendite des S&P 500 betraegt etwa 10% vor Inflation oder etwa 7% nach Inflation. Ein ausgewogenes Portfolio kann langfristig 6-8% pro Jahr erwarten."
          q3: "Wie viel sollte ich monatlich investieren?"
          a3: "Eine gaengige Richtlinie ist, mindestens 15-20% Ihres Bruttoeinkommens fuer die Altersvorsorge zu investieren. Beginnen Sie mit dem, was Sie sich leisten koennen, und erhoehen Sie die Beitraege im Laufe der Zeit."
          q4: "Was ist Dollar-Cost-Averaging?"
          a4: "Dollar-Cost-Averaging ist die Strategie, einen festen Betrag in regelmaessigen Abstaenden unabhaengig von den Marktbedingungen zu investieren. So kaufen Sie mehr Anteile bei niedrigen Preisen und weniger bei hohen Preisen."
          q5: "Sollte ich eine Einmalzahlung investieren oder ueber die Zeit verteilen?"
          a5: "Studien zeigen, dass Einmalinvestitionen in etwa zwei Dritteln der Faelle besser abschneiden als Dollar-Cost-Averaging, da die Maerkte langfristig tendenziell steigen."
      retirement:
        title: "Rentenrechner - Kostenloses Online-Tool"
        description: "Planen Sie Ihren Ruhestand mit unserem kostenlosen Rechner. Schaetzen Sie voraussichtliche Ersparnisse, monatliches Ruhestandseinkommen und Jahre bis zur Rente."
        h1: "Rentenrechner"
        intro: "Schaetzen Sie, wie viel Sie bis zum Ruhestand gespart haben werden und welches monatliche Einkommen Ihr Vermoegen bieten kann."
        breadcrumb: "Rentenrechner"
        labels:
          current_age: "Aktuelles Alter"
          retirement_age: "Rentenalter"
          current_savings: "Aktuelle Ersparnisse ($)"
          monthly_contribution: "Monatlicher Beitrag ($)"
          expected_annual_return: "Erwartete Jahresrendite (%)"
          results: "Ergebnisse"
          years_to_retire: "Jahre bis zur Rente"
          projected_savings: "Voraussichtliche Ersparnisse"
          estimated_monthly_income: "Geschaetztes monatliches Einkommen"
          copy_results: "Ergebnisse kopieren"
        faq:
          q1: "Wie viel Geld brauche ich fuer den Ruhestand?"
          a1: "Der Betrag haengt von Ihrem gewuenschten Lebensstil, den erwarteten Ausgaben und der Dauer Ihres Ruhestands ab. Eine gaengige Faustregel ist, das 25-Fache Ihrer erwarteten Jahresausgaben zu sparen."
          q2: "Was ist die 4%-Regel fuer den Ruhestand?"
          a2: "Die 4%-Regel besagt, dass Rentner im ersten Ruhestandsjahr 4% ihrer Ersparnisse entnehmen und den Betrag jaehrlich an die Inflation anpassen koennen, ohne mindestens 30 Jahre lang Geld zu verlieren."
          q3: "Wann sollte ich anfangen, fuer den Ruhestand zu sparen?"
          a3: "Je frueher Sie beginnen, desto mehr Zeit hat Ihr Geld, durch Zinseszins zu wachsen. Ein Beginn in den 20ern bedeutet, dass selbst kleine monatliche Beitraege zu erheblichen Betraegen anwachsen koennen."
          q4: "Wie beeinflusst der Zinseszins meine Altersvorsorge?"
          a4: "Zinseszins bedeutet, dass Sie Renditen nicht nur auf Ihre urspruenglichen Beitraege, sondern auch auf die angesammelten Zinsen frueherer Jahre erzielen. Ueber 30-40 Jahre kann der Zinseszins Ihre Gesamtbeitraege vervielfachen."
          q5: "Sollte ich mit zunehmendem Alter mehr fuer den Ruhestand beitragen?"
          a5: "Ja, die Erhoehung Ihrer Beitraege mit steigendem Einkommen ist eine kluge Strategie. Viele Finanzberater empfehlen, 10-15% Ihres Bruttoeinkommens fuer den Ruhestand zu sparen."
