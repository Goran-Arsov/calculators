      mortgage:
        title: "Hypothekenrechner - Kostenloses Online-Tool"
        description: "Berechnen Sie Ihre monatliche Hypothekenzahlung, Gesamtzinsen und Gesamtkosten Ihres Immobilienkredits. Kostenloser Hypothekenrechner mit sofortigen Ergebnissen."
        h1: "Hypothekenrechner"
        intro: "Schaetzen Sie Ihre monatliche Hypothekenzahlung, Gesamtzinsen und Gesamtkosten Ihres Immobilienkredits."
        breadcrumb: "Hypothekenrechner"
        labels:
          home_price: "Immobilienpreis ($)"
          annual_interest_rate: "Jaehrlicher Zinssatz (%)"
          loan_term: "Kreditlaufzeit (Jahre)"
          results: "Ergebnisse"
          monthly_payment: "Monatliche Rate"
          total_paid: "Gesamtbetrag"
          total_interest: "Gesamtzinsen"
          number_of_payments: "Anzahl der Zahlungen"
          copy_results: "Ergebnisse kopieren"
        article:
          how_to_use: "So verwenden Sie den Hypothekenrechner"
          how_to_use_p1: "Unser kostenloser Hypothekenrechner hilft Ihnen, die Kosten der Immobilienfinanzierung abzuschaetzen, bevor Sie sich fuer einen Kredit entscheiden. Geben Sie einfach den Gesamtpreis des Hauses (oder den Kreditbetrag nach Ihrer Anzahlung), Ihren erwarteten jaehrlichen Zinssatz und die Kreditlaufzeit in Jahren ein. Der Rechner zeigt sofort Ihre monatliche Rate, den Gesamtbetrag ueber die Laufzeit des Kredits und die Gesamtzinskosten an."
          how_to_use_p2: "Das Verstaendnis Ihrer Hypothekenzahlung ist der erste Schritt zu einem verantwortungsvollen Immobilienkauf. Die meisten Finanzberater empfehlen, die Wohnkosten einschliesslich Hypothek, Steuern und Versicherung unter 28% des Bruttomonatseinkommens zu halten."
          formula_title: "Die Hypothekenzahlungsformel"
          formula_p1: "Monatliche Hypothekenzahlungen werden mit der Standard-Tilgungsformel berechnet: M = P[r(1+r)^n] / [(1+r)^n - 1], wobei P der Hauptkreditbetrag ist, r der monatliche Zinssatz (Jahreszins geteilt durch 12) und n die Gesamtzahl der monatlichen Zahlungen (Jahre mal 12)."
          fixed_vs_adjustable: "Festzins- vs. variabel verzinsliche Hypotheken"
          tips_title: "Tipps fuer einen besseren Hypothekenzins"
        faq:
          q1: "Wie wird eine monatliche Hypothekenzahlung berechnet?"
          a1: "Eine monatliche Hypothekenzahlung wird mit der Formel M = P[r(1+r)^n] / [(1+r)^n - 1] berechnet, wobei P der Hauptkreditbetrag ist, r der monatliche Zinssatz (Jahreszins geteilt durch 12) und n die Gesamtzahl der monatlichen Zahlungen (Jahre mal 12)."
          q2: "Was ist ein guter Hypothekenzins?"
          a2: "Ein guter Hypothekenzins haengt von den aktuellen Marktbedingungen, Ihrer Bonitaet und der Kreditart ab. Generell sind Zinssaetze zwischen 3% und 7% fuer Festzinshypotheken ueblich."
          q3: "Wie viel Haus kann ich mir leisten?"
          a3: "Eine gaengige Faustregel besagt, dass Ihre monatliche Hypothekenzahlung 28% Ihres Bruttomonatseinkommens nicht ueberschreiten sollte."
          q4: "Was ist der Unterschied zwischen einer 15-jaehrigen und einer 30-jaehrigen Hypothek?"
          a4: "Eine 15-jaehrige Hypothek hat hoehere monatliche Raten, aber deutlich niedrigere Gesamtzinsen. Eine 30-jaehrige Hypothek bietet niedrigere monatliche Raten, kostet aber insgesamt mehr Zinsen."
          q5: "Sollte ich Sonderzahlungen auf meine Hypothek leisten?"
          a5: "Sonderzahlungen koennen Ihnen Tausende an Zinsen sparen und helfen, Ihre Hypothek schneller abzuzahlen. Pruefen Sie vorher, ob Ihr Kreditgeber keine Vorfaelligkeitsentschaedigung berechnet."
      compound_interest:
        title: "Zinseszinsrechner - Kostenloses Online-Tool"
        description: "Berechnen Sie Zinseszinsen auf Ihre Ersparnisse oder Investitionen. Sehen Sie, wie Ihr Geld mit verschiedenen Zinsperioden waechst."
        h1: "Zinseszinsrechner"
        intro: "Sehen Sie, wie Ihr Geld im Laufe der Zeit mit der Kraft des Zinseszinses waechst."
        breadcrumb: "Zinseszinsrechner"
        labels:
          initial_principal: "Anfangskapital ($)"
          annual_interest_rate: "Jaehrlicher Zinssatz (%)"
          time_period: "Zeitraum (Jahre)"
          compounding_frequency: "Zinsperiode"
          annually: "Jaehrlich (1x/Jahr)"
          semi_annually: "Halbjaehrlich (2x/Jahr)"
          quarterly: "Vierteljaehrlich (4x/Jahr)"
          monthly: "Monatlich (12x/Jahr)"
          daily: "Taeglich (365x/Jahr)"
          results: "Ergebnisse"
          future_value: "Zukuenftiger Wert"
          total_interest_earned: "Gesamtzinsen verdient"
          initial_principal_display: "Anfangskapital"
          copy_results: "Ergebnisse kopieren"
        faq:
          q1: "Was ist Zinseszins?"
          a1: "Zinseszins ist Zins, der sowohl auf das Anfangskapital als auch auf die angesammelten Zinsen aus frueheren Perioden berechnet wird. Im Gegensatz zu einfachen Zinsen ermoeglicht der Zinseszins ein exponentielles Wachstum Ihres Geldes."
          q2: "Wie oft sollten Zinsen verzinst werden?"
          a2: "Haeufigere Verzinsung erzeugt hoehere Ertraege. Taegliche Verzinsung bringt etwas mehr als monatliche, die wiederum mehr als vierteljaehrliche oder jaehrliche Verzinsung bringt."
          q3: "Was ist die 72er-Regel?"
          a3: "Die 72er-Regel ist eine schnelle Methode, um abzuschaetzen, wie lange es dauert, bis sich eine Investition verdoppelt. Teilen Sie 72 durch den jaehrlichen Zinssatz. Bei 6% Zinsen verdoppelt sich Ihr Geld in etwa 12 Jahren."
          q4: "Was ist der Unterschied zwischen APR und APY?"
          a4: "APR (Annual Percentage Rate) ist der angegebene Jahreszins ohne Beruecksichtigung der Verzinsung. APY (Annual Percentage Yield) beruecksichtigt den Zinseszinseffekt und spiegelt die tatsaechliche Jahresrendite wider."
          q5: "Wie unterscheidet sich Zinseszins von einfachen Zinsen?"
          a5: "Einfache Zinsen werden nur auf das Anfangskapital berechnet. Zinseszins wird auf das Kapital plus alle zuvor verdienten Zinsen berechnet. Ueber lange Zeitraeume generiert der Zinseszins deutlich mehr Vermoegen."
      loan:
        title: "Kreditrechner - Kostenloses Online-Tool"
        description: "Berechnen Sie monatliche Kreditraten, Gesamtzinsen und Gesamtkosten fuer jede Art von Kredit. Kostenloser Kreditrechner mit sofortigen Ergebnissen."
        h1: "Kreditrechner"
        intro: "Berechnen Sie monatliche Zahlungen, Gesamtzinsen und Gesamtkosten fuer jede Art von Kredit."
        breadcrumb: "Kreditrechner"
        labels:
          loan_amount: "Kreditbetrag ($)"
          annual_interest_rate: "Jaehrlicher Zinssatz (%)"
          loan_term: "Kreditlaufzeit (Jahre)"
          results: "Ergebnisse"
          monthly_payment: "Monatliche Rate"
          total_paid: "Gesamtbetrag"
          total_interest: "Gesamtzinsen"
          number_of_payments: "Anzahl der Zahlungen"
          copy_results: "Ergebnisse kopieren"
        faq:
          q1: "Wie berechnet man monatliche Kreditraten?"
          a1: "Monatliche Kreditraten werden mit der Tilgungsformel berechnet: M = P[r(1+r)^n] / [(1+r)^n - 1], wobei P der Kreditbetrag ist, r der monatliche Zinssatz und n die Gesamtzahl der Zahlungen."
          q2: "Welche Faktoren beeinflussen Kreditzinsen?"
          a2: "Kreditzinsen werden von Ihrer Bonitaet, Ihrem Einkommen und Schulden-Einkommens-Verhaeltnis, Kreditbetrag und Laufzeit, Sicherheiten und den aktuellen Marktbedingungen beeinflusst."
          q3: "Ist eine kuerzere oder laengere Kreditlaufzeit besser?"
          a3: "Eine kuerzere Laufzeit bedeutet hoehere monatliche Raten, aber weniger Gesamtzinsen. Eine laengere Laufzeit senkt die monatliche Rate, kostet aber insgesamt mehr."
          q4: "Was ist der Unterschied zwischen besicherten und unbesicherten Krediten?"
          a4: "Besicherte Kredite sind durch Sicherheiten wie ein Auto oder Haus abgesichert. Unbesicherte Kredite haben keine Sicherheiten und tragen daher hoehere Zinssaetze."
          q5: "Kann ich einen Kredit vorzeitig zurueckzahlen, um Zinsen zu sparen?"
          a5: "Ja, die vorzeitige Rueckzahlung eines Kredits kann erheblich Zinsen sparen. Pruefen Sie jedoch, ob Ihr Kreditgeber eine Vorfaelligkeitsentschaedigung berechnet."
