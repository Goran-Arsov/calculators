pt:
  health:
    category_name: "Saude"
    calculators:
      bmi:
        title: "Calculadora de IMC - Ferramenta Gratuita de Indice de Massa Corporal"
        description: "Calcule seu Indice de Massa Corporal (IMC) instantaneamente com nossa calculadora gratuita. Suporta unidades metricas e imperiais. Descubra sua categoria de peso e faixa de peso saudavel."
        h1: "Calculadora de IMC"
        intro: "Calcule seu Indice de Massa Corporal e descubra se seu peso esta dentro de uma faixa saudavel."
        breadcrumb: "Calculadora de IMC"
        labels:
          unit_system: "Sistema de unidades"
          metric: "Metrico (kg, cm)"
          imperial: "Imperial (lbs, in)"
          weight: "Peso (kg)"
          height: "Altura (cm)"
          results: "Resultados"
          your_bmi: "Seu IMC"
          category: "Categoria"
          healthy_weight_min: "Peso saudavel Min"
          healthy_weight_max: "Peso saudavel Max"
          copy_results: "Copiar resultados"
        faq:
          q1: "O que e IMC e como e calculado?"
          a1: "IMC (Indice de Massa Corporal) e uma medida simples de gordura corporal baseada no peso e altura. E calculado dividindo o peso em quilogramas pelo quadrado da altura em metros (kg/m2)."
          q2: "Qual e a faixa de IMC saudavel?"
          a2: "Um IMC saudavel para a maioria dos adultos esta entre 18,5 e 24,9. Um IMC abaixo de 18,5 e considerado abaixo do peso, de 25 a 29,9 sobrepeso e 30 ou mais como obeso."
          q3: "O IMC e preciso para atletas e pessoas musculosas?"
          a3: "O IMC pode superestimar a gordura corporal em atletas porque nao distingue entre musculo e gordura. A porcentagem de gordura corporal pode ser uma medida mais util para essas pessoas."
          q4: "O IMC difere por idade e sexo?"
          a4: "A formula padrao do IMC e a mesma para todos os adultos. No entanto, a interpretacao pode variar. Para criancas e adolescentes, o IMC e interpretado usando percentis especificos por idade e sexo."
          q5: "O que devo fazer se meu IMC estiver fora da faixa saudavel?"
          a5: "Se seu IMC estiver fora da faixa saudavel, consulte um profissional de saude antes de fazer mudancas. Ele pode avaliar sua saude geral e recomendar um plano personalizado."
      calorie:
        title: "Calculadora de Calorias - Ferramenta Gratuita de Necessidades Caloricas"
        description: "Calcule suas necessidades caloricas diarias com nossa calculadora gratuita. Estima BMR e TDEE com base na idade, sexo, peso, altura e nivel de atividade."
        h1: "Calculadora de Calorias"
        intro: "Estime suas necessidades caloricas diarias para manutencao, perda ou ganho de peso com base em seus dados pessoais e nivel de atividade."
        breadcrumb: "Calculadora de Calorias"
        labels:
          unit_system: "Sistema de unidades"
          metric: "Metrico (kg, cm)"
          imperial: "Imperial (lbs, in)"
          age: "Idade (anos)"
          sex: "Sexo"
          male: "Masculino"
          female: "Feminino"
          weight: "Peso (kg)"
          height: "Altura (cm)"
          activity_level: "Nivel de atividade"
          sedentary: "Sedentario (pouco ou nenhum exercicio)"
          light: "Leve (1-3 dias/semana)"
          moderate: "Moderado (3-5 dias/semana)"
          active: "Ativo (6-7 dias/semana)"
          very_active: "Muito ativo (exercicio intenso diario)"
          results: "Resultados"
          bmr: "Taxa Metabolica Basal (BMR)"
          maintenance: "Manutencao (TDEE)"
          mild_loss: "Perda leve (-0,25 kg/sem)"
          weight_loss: "Perda de peso (-0,5 kg/sem)"
          mild_gain: "Ganho leve (+0,25 kg/sem)"
          weight_gain: "Ganho de peso (+0,5 kg/sem)"
          copy_results: "Copiar resultados"
        faq:
          q1: "Quantas calorias preciso por dia?"
          a1: "As necessidades caloricas diarias variam com base na idade, sexo, peso, altura e nivel de atividade. A mulher adulta media precisa de aproximadamente 1.600 a 2.400 calorias por dia, o homem adulto medio de aproximadamente 2.000 a 3.000."
          q2: "Qual e a diferenca entre BMR e TDEE?"
          a2: "O BMR (taxa metabolica basal) e o numero de calorias que seu corpo queima em repouso completo. O TDEE e seu BMR multiplicado por um fator de atividade."
          q3: "Quantas calorias devo comer para perder peso?"
          a3: "Uma taxa segura de perda de peso e de 0,5 a 1 kg por semana, o que requer um deficit diario de aproximadamente 500 a 1.000 calorias abaixo do seu TDEE."
          q4: "O que e a equacao de Mifflin-St Jeor?"
          a4: "A equacao de Mifflin-St Jeor e considerada a formula mais precisa para estimar o BMR. Para homens: BMR = (10 x peso em kg) + (6,25 x altura em cm) - (5 x idade) + 5."
          q5: "O exercicio aumenta o numero de calorias que preciso?"
          a5: "Sim, a atividade fisica aumenta seu gasto energetico total diario. Quanto mais intenso e frequente o exercicio, mais calorias voce queima."
      body_fat:
        title: "Calculadora de Gordura Corporal - Ferramenta Gratuita"
        description: "Estime sua porcentagem de gordura corporal com nossa calculadora gratuita usando o metodo da Marinha dos EUA. Insira suas medidas em unidades metricas ou imperiais."
        h1: "Calculadora de Gordura Corporal"
        intro: "Estime sua porcentagem de gordura corporal usando o metodo da Marinha dos EUA com medidas corporais simples."
        breadcrumb: "Calculadora de Gordura Corporal"
        labels:
          sex: "Sexo"
          male: "Masculino"
          female: "Feminino"
          unit_system: "Sistema de unidades"
          metric: "Metrico (cm)"
          imperial: "Imperial (in)"
          waist: "Cintura (cm)"
          neck: "Pescoco (cm)"
          height: "Altura (cm)"
          hip: "Quadril (cm)"
          results: "Resultados"
          body_fat_percentage: "Porcentagem de gordura corporal"
          category: "Categoria"
          copy_results: "Copiar resultados"
        faq:
          q1: "Como funciona a formula de gordura corporal da Marinha dos EUA?"
          a1: "O metodo da Marinha dos EUA estima a porcentagem de gordura corporal usando medidas de circunferencia. Para homens, a formula usa medidas de cintura, pescoco e altura. Para mulheres, uma medida de quadril e adicionada."
          q2: "Qual e uma porcentagem de gordura corporal saudavel?"
          a2: "As faixas saudaveis diferem por sexo. Para homens: 6-13% atletico, 14-17% em forma, 18-24% aceitavel, acima de 25% obeso. Para mulheres: 14-20% atletico, 21-24% em forma, 25-31% aceitavel, acima de 32% obeso."
          q3: "A porcentagem de gordura corporal e mais util que o IMC?"
          a3: "A porcentagem de gordura corporal fornece uma imagem mais precisa da composicao corporal do que o IMC porque estima diretamente a massa gorda em vez de simplesmente relacionar peso com altura."
          q4: "Quao preciso e o metodo de gordura corporal da Marinha dos EUA?"
          a4: "O metodo da Marinha dos EUA e preciso dentro de cerca de 3-4% de gordura corporal para a maioria das pessoas quando as medidas sao tomadas corretamente."
          q5: "Como devo tirar as medidas corporais para esta calculadora?"
          a5: "Meca sua cintura no ponto mais estreito (na altura do umbigo para homens). Meca seu pescoco logo abaixo da laringe. Meca os quadris (apenas mulheres) no ponto mais largo das nadegas."
      tdee:
        title: "Calculadora TDEE - Ferramenta Gratuita de Gasto Energetico Total"
        description: "Calcule seu gasto energetico total diario (TDEE) e taxa metabolica basal (BMR) com nossa calculadora gratuita."
        h1: "Calculadora TDEE"
        intro: "Calcule seu gasto energetico total diario e taxa metabolica basal para entender quantas calorias voce queima por dia."
        breadcrumb: "Calculadora TDEE"
        labels:
          weight: "Peso (kg)"
          height: "Altura (cm)"
          age: "Idade (anos)"
          gender: "Sexo"
          male: "Masculino"
          female: "Feminino"
          activity_level: "Nivel de atividade"
          sedentary: "Sedentario (pouco ou nenhum exercicio)"
          light: "Levemente ativo (1-3 dias/semana)"
          moderate: "Moderadamente ativo (3-5 dias/semana)"
          active: "Muito ativo (6-7 dias/semana)"
          extra: "Extremamente ativo (intenso diario + trabalho fisico)"
          results: "Resultados"
          bmr: "Taxa Metabolica Basal (BMR)"
          tdee: "TDEE"
          copy_results: "Copiar resultados"
        faq:
          q1: "O que e TDEE e por que e importante?"
          a1: "TDEE significa Total Daily Energy Expenditure - o numero total de calorias que seu corpo queima em um dia. Conhecer seu TDEE e essencial para gerenciar seu peso."
          q2: "Qual e a diferenca entre BMR e TDEE?"
          a2: "O BMR e o numero de calorias que seu corpo precisa em repouso completo. O TDEE pega seu BMR e o multiplica por um fator de atividade."
          q3: "Qual formula e usada para calcular o BMR?"
          a3: "Esta calculadora usa a equacao de Mifflin-St Jeor. Para homens: BMR = (10 x peso em kg) + (6,25 x altura em cm) - (5 x idade) + 5."
          q4: "Como escolho o nivel de atividade correto?"
          a4: "Sedentario significa pouco ou nenhum exercicio. Levemente ativo significa exercicio leve 1-3 dias por semana. Moderadamente ativo significa exercicio moderado 3-5 dias por semana. Na duvida, escolha um nivel abaixo."
          q5: "Como devo usar o TDEE para perda de peso ou ganho muscular?"
          a5: "Para perda de peso, coma 300-500 calorias abaixo do seu TDEE. Para ganho muscular, coma 200-400 calorias acima do seu TDEE combinado com treinamento de resistencia."
      macro:
        title: "Calculadora de Macros - Ferramenta Gratuita de Macronutrientes"
        description: "Calcule sua distribuicao ideal de macronutrientes com nossa calculadora gratuita. Metas personalizadas de proteinas, carboidratos e gorduras."
        h1: "Calculadora de Macros"
        intro: "Calcule suas metas diarias ideais de proteinas, carboidratos e gorduras com base na sua ingestao calorica e objetivo fitness."
        breadcrumb: "Calculadora de Macros"
        labels:
          daily_calories: "Calorias diarias"
          goal: "Objetivo"
          maintain: "Manter peso"
          cut: "Definicao (perda de gordura)"
          bulk: "Volume (ganho muscular)"
          results: "Resultados"
          protein: "Proteinas"
          carbs: "Carboidratos"
          fat: "Gorduras"
          copy_results: "Copiar resultados"
        faq:
          q1: "O que sao macronutrientes e por que sao importantes?"
          a1: "Macronutrientes - proteinas, carboidratos e gorduras - sao os tres principais nutrientes que seu corpo precisa em grandes quantidades. Cada um desempenha um papel unico na composicao corporal, niveis de energia e desempenho."
          q2: "Quantos gramas de proteina preciso por dia?"
          a2: "As necessidades de proteina dependem de seus objetivos e nivel de atividade. Para saude geral, 0,8 g por kg de peso corporal e suficiente. Para construcao muscular, 1,6 a 2,2 g por kg sao recomendados."
          q3: "Qual e a melhor proporcao de macros para perder peso?"
          a3: "Uma distribuicao comum para perda de peso e 40% proteinas, 35% carboidratos e 25% gorduras. A maior ingestao de proteinas ajuda a preservar a massa muscular durante um deficit calorico."
          q4: "Qual e a melhor proporcao de macros para ganhar musculo?"
          a4: "Para ganho muscular, uma distribuicao tipica e 30% proteinas, 45% carboidratos e 25% gorduras. Os carboidratos mais altos alimentam os treinos intensos e apoiam a recuperacao."
          q5: "Preciso rastrear os macros exatamente todos os dias?"
          a5: "O rastreamento diario exato nao e necessario para a maioria das pessoas. Atingir suas metas de macros dentro de mais ou menos 10% geralmente e suficiente para ver resultados."
