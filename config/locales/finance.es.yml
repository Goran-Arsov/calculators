      mortgage:
        title: "Calculadora de Hipoteca - Herramienta Gratuita en Linea"
        description: "Calcule su pago mensual de hipoteca, intereses totales y costo total de su prestamo hipotecario. Calculadora de hipoteca gratuita con resultados instantaneos."
        h1: "Calculadora de Hipoteca"
        intro: "Estime su pago mensual de hipoteca, intereses totales y costo total de su prestamo hipotecario."
        breadcrumb: "Calculadora de Hipoteca"
        labels:
          home_price: "Precio de la vivienda ($)"
          annual_interest_rate: "Tasa de interes anual (%)"
          loan_term: "Plazo del prestamo (Anos)"
          results: "Resultados"
          monthly_payment: "Pago mensual"
          total_paid: "Total pagado"
          total_interest: "Intereses totales"
          number_of_payments: "Numero de pagos"
          copy_results: "Copiar resultados"
        faq:
          q1: "Como se calcula un pago mensual de hipoteca?"
          a1: "Un pago mensual de hipoteca se calcula con la formula M = P[r(1+r)^n] / [(1+r)^n - 1], donde P es el monto del prestamo, r la tasa de interes mensual (tasa anual dividida por 12), y n el numero total de pagos mensuales (anos por 12)."
          q2: "Que es una buena tasa de interes hipotecaria?"
          a2: "Una buena tasa hipotecaria depende de las condiciones actuales del mercado, su puntaje crediticio y el tipo de prestamo. Generalmente, tasas entre 3% y 7% son comunes para hipotecas de tasa fija."
          q3: "Cuanta casa puedo pagar?"
          a3: "Una pauta comun es que su pago mensual de hipoteca no debe exceder el 28% de su ingreso mensual bruto."
          q4: "Cual es la diferencia entre una hipoteca a 15 y 30 anos?"
          a4: "Una hipoteca a 15 anos tiene pagos mensuales mas altos pero intereses totales significativamente menores. Una hipoteca a 30 anos ofrece pagos mensuales mas bajos pero cuesta mas en intereses totales."
          q5: "Deberia hacer pagos adicionales a mi hipoteca?"
          a5: "Los pagos adicionales pueden ahorrarle miles en intereses y ayudarle a pagar su hipoteca mas rapido. Verifique primero que su prestamista no cobre penalidades por pago anticipado."
      compound_interest:
        title: "Calculadora de Interes Compuesto - Herramienta Gratuita en Linea"
        description: "Calcule el interes compuesto de sus ahorros o inversiones. Vea como crece su dinero con diferentes frecuencias de capitalizacion."
        h1: "Calculadora de Interes Compuesto"
        intro: "Vea como crece su dinero con el tiempo gracias al poder del interes compuesto."
        breadcrumb: "Calculadora de Interes Compuesto"
        labels:
          initial_principal: "Capital inicial ($)"
          annual_interest_rate: "Tasa de interes anual (%)"
          time_period: "Periodo (Anos)"
          compounding_frequency: "Frecuencia de capitalizacion"
          annually: "Anual (1x/ano)"
          semi_annually: "Semestral (2x/ano)"
          quarterly: "Trimestral (4x/ano)"
          monthly: "Mensual (12x/ano)"
          daily: "Diario (365x/ano)"
          results: "Resultados"
          future_value: "Valor futuro"
          total_interest_earned: "Intereses totales ganados"
          initial_principal_display: "Capital inicial"
          copy_results: "Copiar resultados"
        faq:
          q1: "Que es el interes compuesto?"
          a1: "El interes compuesto es interes calculado sobre el capital inicial y sobre los intereses acumulados de periodos anteriores. A diferencia del interes simple, el interes compuesto permite que su dinero crezca exponencialmente."
          q2: "Con que frecuencia deben capitalizarse los intereses?"
          a2: "Una capitalizacion mas frecuente produce mayores rendimientos. La capitalizacion diaria rinde ligeramente mas que la mensual, que rinde mas que la trimestral o anual."
          q3: "Que es la regla del 72?"
          a3: "La regla del 72 es una forma rapida de estimar cuanto tiempo tarda una inversion en duplicarse. Divida 72 por la tasa de interes anual. Al 6%, su dinero se duplica en aproximadamente 12 anos."
          q4: "Cual es la diferencia entre TAE y TIN?"
          a4: "El TIN es la tasa de interes anual sin considerar la capitalizacion. La TAE incluye el efecto de la capitalizacion y refleja el rendimiento real que obtiene en un ano."
          q5: "Como se diferencia el interes compuesto del interes simple?"
          a5: "El interes simple se calcula solo sobre el capital inicial. El interes compuesto se calcula sobre el capital mas todos los intereses ganados previamente. A largo plazo, el interes compuesto genera significativamente mas riqueza."
      loan:
        title: "Calculadora de Prestamos - Herramienta Gratuita en Linea"
        description: "Calcule pagos mensuales, intereses totales y costo total para cualquier tipo de prestamo. Calculadora de prestamos gratuita con resultados instantaneos."
        h1: "Calculadora de Prestamos"
        intro: "Calcule pagos mensuales, intereses totales y costo total para cualquier tipo de prestamo."
        breadcrumb: "Calculadora de Prestamos"
        labels:
          loan_amount: "Monto del prestamo ($)"
          annual_interest_rate: "Tasa de interes anual (%)"
          loan_term: "Plazo del prestamo (Anos)"
          results: "Resultados"
          monthly_payment: "Pago mensual"
          total_paid: "Total pagado"
          total_interest: "Intereses totales"
          number_of_payments: "Numero de pagos"
          copy_results: "Copiar resultados"
        faq:
          q1: "Como se calculan los pagos mensuales de un prestamo?"
          a1: "Los pagos mensuales se calculan con la formula de amortizacion: M = P[r(1+r)^n] / [(1+r)^n - 1], donde P es el monto del prestamo, r la tasa de interes mensual y n el numero total de pagos."
          q2: "Que factores afectan las tasas de interes de los prestamos?"
          a2: "Las tasas de interes se ven influenciadas por su puntaje crediticio, ingresos, monto y plazo del prestamo, garantias y las condiciones actuales del mercado."
          q3: "Es mejor elegir un plazo de prestamo mas corto o mas largo?"
          a3: "Un plazo mas corto significa pagos mensuales mas altos pero menos intereses totales pagados. Un plazo mas largo reduce el pago mensual pero cuesta mas en total."
          q4: "Cual es la diferencia entre prestamos con garantia y sin garantia?"
          a4: "Los prestamos con garantia estan respaldados por bienes como un auto o casa. Los prestamos sin garantia no tienen respaldo y por lo tanto tienen tasas de interes mas altas."
          q5: "Puedo pagar un prestamo anticipadamente para ahorrar en intereses?"
          a5: "Si, el pago anticipado puede ahorrar mucho en intereses. Sin embargo, algunos prestamistas cobran penalidades por pago anticipado. Consulte su contrato antes de hacer pagos adicionales."
