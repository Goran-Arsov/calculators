        h1: "Calculadora de Inversiones"
        intro: "Proyecte como crecen sus inversiones con el tiempo con un deposito inicial y contribuciones mensuales regulares."
        breadcrumb: "Calculadora de Inversiones"
        labels:
          initial_investment: "Inversion inicial ($)"
          monthly_contribution: "Contribucion mensual ($)"
          expected_annual_return: "Rendimiento anual esperado (%)"
          investment_period: "Periodo de inversion (Anos)"
          results: "Resultados"
          future_value: "Valor futuro"
          total_contributions: "Contribuciones totales"
          investment_growth: "Crecimiento de la inversion"
          copy_results: "Copiar resultados"
        faq:
          q1: "Como funciona una calculadora de inversiones?"
          a1: "Una calculadora de inversiones proyecta el valor futuro de su dinero aplicando crecimiento compuesto a su inversion inicial y contribuciones mensuales regulares."
          q2: "Cual es una tasa de rendimiento anual realista para inversiones?"
          a2: "El rendimiento anual promedio historico del S&P 500 es aproximadamente 10% antes de la inflacion, o alrededor del 7% despues de la inflacion. Una cartera equilibrada puede esperar 6-8% anual a largo plazo."
          q3: "Cuanto deberia invertir cada mes?"
          a3: "Una pauta comun es invertir al menos el 15-20% de su ingreso bruto para la jubilacion. Comience con lo que pueda permitirse y aumente las contribuciones con el tiempo."
          q4: "Que es el promedio de costo en dolares?"
          a4: "El promedio de costo en dolares es la estrategia de invertir una cantidad fija a intervalos regulares independientemente de las condiciones del mercado."
          q5: "Deberia invertir una suma global o distribuirla en el tiempo?"
          a5: "Los estudios muestran que la inversion de suma global supera al promedio de costo en dolares aproximadamente dos tercios del tiempo, ya que los mercados tienden a subir con el tiempo."
      retirement:
        title: "Calculadora de Jubilacion - Herramienta Gratuita en Linea"
        description: "Planifique su jubilacion con nuestra calculadora gratuita. Estime ahorros proyectados, ingreso mensual de jubilacion y anos hasta la jubilacion."
        h1: "Calculadora de Jubilacion"
        intro: "Estime cuanto habra ahorrado para la jubilacion y que ingreso mensual puede proporcionar su patrimonio."
        breadcrumb: "Calculadora de Jubilacion"
        labels:
          current_age: "Edad actual"
          retirement_age: "Edad de jubilacion"
          current_savings: "Ahorros actuales ($)"
          monthly_contribution: "Contribucion mensual ($)"
          expected_annual_return: "Rendimiento anual esperado (%)"
          results: "Resultados"
          years_to_retire: "Anos para jubilarse"
          projected_savings: "Ahorros proyectados"
          estimated_monthly_income: "Ingreso mensual estimado"
          copy_results: "Copiar resultados"
        faq:
          q1: "Cuanto dinero necesito para jubilarme?"
          a1: "La cantidad depende de su estilo de vida deseado, gastos esperados y duracion de su jubilacion. Una regla comun es ahorrar 25 veces sus gastos anuales esperados."
          q2: "Que es la regla del 4% para la jubilacion?"
          a2: "La regla del 4% sugiere que los jubilados pueden retirar el 4% de sus ahorros el primer ano y ajustar por inflacion cada ano siguiente sin agotar sus fondos durante al menos 30 anos."
          q3: "Cuando deberia empezar a ahorrar para la jubilacion?"
          a3: "Cuanto antes empiece, mas tiempo tiene su dinero para crecer gracias al interes compuesto. Empezar a los 20 significa que incluso pequenas contribuciones mensuales pueden crecer sustancialmente."
          q4: "Como afecta el interes compuesto a mis ahorros para la jubilacion?"
          a4: "El interes compuesto significa que obtiene rendimientos no solo sobre sus contribuciones originales, sino tambien sobre los intereses acumulados de anos anteriores."
          q5: "Deberia contribuir mas a la jubilacion a medida que envejezco?"
          a5: "Si, aumentar sus contribuciones a medida que crecen sus ingresos es una estrategia inteligente. Muchos asesores financieros recomiendan ahorrar el 10-15% de su ingreso bruto para la jubilacion."
